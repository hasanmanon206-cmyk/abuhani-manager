:root{

--c2:#fad0c4;
--c3:#a18cd1;
--c4:#fbc2eb;
--c5:#8fd3f4;

--glass:rgba(255,255,255,.18);
--border:rgba(255,255,255,.25);

--blue:#1a73e8;
--green:#16a34a;
--red:#dc2626;
--orange:#f59e0b;

--radius:18px;

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
background:linear-gradient(-45deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5));
background-size:400% 400%;
animation:bg 14s ease infinite;
min-height:100vh;
padding:12px;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.hidden{
display:none !important;
}

.container{
max-width:650px;
margin:auto;
}

.glass{
background:var(--glass);
backdrop-filter:blur(12px);
border:1px solid var(--border);
box-shadow:0 8px 30px rgba(0,0,0,.12);
border-radius:var(--radius);
}

.login-box{
padding:25px;
margin-top:50px;
color:#fff;
}

.login-box h1{
text-align:center;
margin-bottom:10px;
font-size:34px;
}

.login-box p{
text-align:center;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
font-size:15px;
outline:none;
}

button{
border:none;
cursor:pointer;
border-radius:12px;
font-weight:bold;
transition:.2s;
}

button:active{
transform:scale(.97);
}

.btn{
padding:12px;
width:100%;
color:#fff;
font-size:15px;
}

.btn-primary{
background:linear-gradient(45deg,#2563eb,#7c3aed);
}

.btn-green{
background:linear-gradient(45deg,#16a34a,#22c55e);
}

.btn-red{
background:linear-gradient(45deg,#dc2626,#ef4444);
}

.btn-orange{
background:linear-gradient(45deg,#f59e0b,#f97316);
}

.topbar{
padding:15px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
}

.userbox h2{
font-size:18px;
}

.userbox p{
font-size:13px;
opacity:.9;
}

.clock{
font-size:15px;
font-weight:bold;
}

.logout{
background:#dc2626;
padding:10px 14px;
color:#fff;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:12px;
}

.card{
padding:18px;
color:#fff;
text-align:center;
border-radius:18px;
}

.card h3{
font-size:30px;
margin-bottom:5px;
}

.card:nth-child(1){
background:linear-gradient(45deg,#2563eb,#60a5fa);
}

.card:nth-child(2){
background:linear-gradient(45deg,#16a34a,#4ade80);
}

.card:nth-child(3){
background:linear-gradient(45deg,#f59e0b,#fbbf24);
}

.card:nth-child(4){
background:linear-gradient(45deg,#dc2626,#fb7185);
}

.menu-toggle{
position:fixed;
top:15px;
right:15px;
z-index:999;
width:50px;
height:50px;
border-radius:50%;
background:#111827;
color:#fff;
font-size:20px;
}

.sidebar{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
padding:20px;

}

.sidebar.active{
right:0;
}

.sidebar h3{
color:#fff;
margin-bottom:15px;
}

.side-btn{
width:100%;
padding:12px;
margin-bottom:8px;
background:rgba(255,255,255,.12);
color:#fff;
text-align:right;
}

.side-btn.active{
background:#fff;
color:#111827;
}

.content{
padding:18px;
color:#fff;
margin-bottom:20px;
}

.section-title{
margin-bottom:15px;
font-size:22px;
}

.list{
margin-top:15px;
}

.item{
background:rgba(255,255,255,.1);
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

.item-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.item-actions{

}

.small-btn{
padding:8px 10px;

.report-box{

.cards{

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
databaseURL:"https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

const ADMIN_USER="admin";
const ADMIN_PASS="admin321";

let currentUser=null;

function $(id){
return document.getElementById(id);
}

function toggleSidebar(){
$("sidebar").classList.toggle("active");
}

function login(){

const u=$("username").value.trim();
const p=$("password").value.trim();

if(u===ADMIN_USER && p===ADMIN_PASS){

currentUser={
name:"أبو هاني",
role:"owner"
};

localStorage.setItem("abuhani_session",JSON.stringify(currentUser));

$("loginPage").classList.add("hidden");
$("app").classList.remove("hidden");

startSystem();

}else{
alert("بيانات الدخول غير صحيحة");
}

}

function logout(){

localStorage.removeItem("abuhani_session");

alert("تم تسجيل الخروج واحتساب وقت الوردية");

location.reload();

}

function startSystem(){

$("topUser").innerText="👑 "+currentUser.name;
$("topRole").innerText="مدير عام";

updateClock();

setInterval(updateClock,1000);

loadDashboard();

listenOrders();

openTab("dashboard");

}

function updateClock(){

const d=new Date();

$("clock").innerText=d.toLocaleTimeString("ar");

}

function openTab(tab,btn){

document.querySelectorAll(".side-btn").forEach(b=>{
b.classList.remove("active");
});

if(btn){
btn.classList.add("active");
}

$("sidebar").classList.remove("active");

if(tab==="dashboard"){
$("dashboardTab").classList.remove("hidden");
$("mainContent").classList.add("hidden");
return;
}

$("dashboardTab").classList.add("hidden");
$("mainContent").classList.remove("hidden");

if(tab==="employees"){
renderEmployees();
}

if(tab==="products"){
renderProducts();
}

if(tab==="categories"){
renderCategories();
}

if(tab==="suppliers"){
renderSuppliers();
}

if(tab==="customers"){
renderCustomers();
}

if(tab==="orders"){
renderOrders();
}

if(tab==="barista"){
renderBarista();
}

if(tab==="accountant"){
renderAccountant();
}

if(tab==="pricing"){
renderPricing();
}

if(tab==="shifts"){
renderShifts();
}

if(tab==="reports"){
renderReports();
}

}

function loadDashboard(){

db.ref("employees").on("value",s=>{
$("empCount").innerText=s.numChildren();
});

db.ref("products").on("value",s=>{
$("prodCount").innerText=s.numChildren();
});

db.ref("orders").on("value",s=>{

$("orderCount").innerText=s.numChildren();

let total=0;

s.forEach(x=>{
total+=Number(x.val().total||0);
});

$("salesCount").innerText=total.toLocaleString();

});

}

function listenOrders(){

db.ref("orders").limitToLast(10).on("value",s=>{

let html="";

s.forEach(x=>{

const d=x.val();

html+=`
<div class="item">
🛒 طلب جديد من ${d.customer?.name || "-"}
<br>
💰 ${Number(d.total||0).toLocaleString()} ل.س
</div>
`;

});

$("liveActivities").innerHTML=html || "لا يوجد نشاط";

});

}

/* ================= الموظفين ================= */

function renderEmployees(){

$("mainContent").innerHTML=`

<h2 class="section-title">👥 إدارة الموظفين</h2>

<input id="empName" placeholder="اسم الموظف">

<input id="empPhone" placeholder="الهاتف">

<input id="empUser" placeholder="اسم المستخدم">

<input id="empPass" placeholder="كلمة المرور">

<select id="empRole">
<option value="waiter">جرسون</option>
<option value="barista">باريستا</option>
<option value="accountant">محاسب</option>
</select>

<button class="btn btn-green" onclick="addEmployee()">
➕ إضافة موظف
</button>

<div class="list" id="employeesList"></div>

`;

db.ref("employees").on("value",s=>{

let html="";

s.forEach(x=>{

const d=x.val();

html+=`

<div class="item">

<div class="item-top">

<div>
<b>${d.name}</b>
<br>
📞 ${d.phone || "-"}
<br>
🧩 ${d.role || "-"}
</div>

</div>

<div class="item-actions">

<button class="small-btn btn-orange" onclick="editEmployee('${x.key}')">
✏️ تعديل
</button>

<button class="small-btn btn-red" onclick="deleteEmployee('${x.key}')">
🗑 حذف
</button>

</div>

</div>

`;

});

$("employeesList").innerHTML=html || "لا يوجد موظفين";

});

}

function addEmployee(){

const data={
name:$("empName").value,
phone:$("empPhone").value,
username:$("empUser").value,
password:$("empPass").value,
role:$("empRole").value
};

db.ref("employees").push(data);

alert("تمت إضافة الموظف");

}

function deleteEmployee(id){

if(confirm("حذف الموظف؟")){

db.ref("employees/"+id).remove();

alert("تم الحذف");

}

}

function editEmployee(id){

db.ref("employees/"+id).once("value").then(s=>{

const d=s.val();

const name=prompt("الاسم",d.name);

if(name===null)return;

db.ref("employees/"+id).update({
name:name
});

alert("تم التعديل");

});

}

/* ================= المنتجات ================= */

function renderProducts(){

$("mainContent").innerHTML=`

<h2 class="section-title">📦 المنتجات</h2>

<input id="prodName" placeholder="اسم المنتج">

<input id="prodPrice" type="number" placeholder="السعر">

<input id="prodStock" type="number" placeholder="المخزون">

<input id="prodCat" placeholder="ID القسم">

<button class="btn btn-green" onclick="addProduct()">
➕ إضافة منتج
</button>

<div class="list" id="productsList"></div>

`;

db.ref("products").on("value",s=>{

let html="";

s.forEach(x=>{

const d=x.val();

html+=`

<div class="item">

<b>${d.name}</b>

<br>

💰 ${Number(d.price||0).toLocaleString()} ل.س

<br>

📦 ${d.stock||0}

<div class="item-actions">

<button class="small-btn btn-orange" onclick="editProduct('${x.key}')">
✏️
</button>

<button class="small-btn btn-red" onclick="deleteProduct('${x.key}')">
🗑
</button>

</div>

</div>

`;

});

$("productsList").innerHTML=html;

});

}

function addProduct(){

db.ref("products").push({
name:$("prodName").value,
price:Number($("prodPrice").value),
stock:Number($("prodStock").value),
categoryId:$("prodCat").value
});

alert("تمت إضافة المنتج");

}

function deleteProduct(id){

db.ref("products/"+id).remove();

alert("تم حذف المنتج");

}

function editProduct(id){

db.ref("products/"+id).once("value").then(s=>{

const d=s.val();

const price=prompt("السعر الجديد",d.price);

if(price===null)return;

db.ref("products/"+id).update({
price:Number(price)
});

alert("تم تعديل المنتج");

});

}

function renderOrders(){

$("mainContent").innerHTML=`

<h2 class="section-title">🛒 الطلبات</h2>

<div class="list" id="ordersList"></div>

`;

db.ref("orders").on("value",s=>{

let html="";

s.forEach(x=>{

const d=x.val();

html+=`

<div class="item">

<b>👤 ${d.customer?.name||"-"}</b>

<br>

💰 ${Number(d.total||0).toLocaleString()} ل.س

function approveOrder(id){

db.ref("orders/"+id+"/status").set("approved");

alert("تم قبول الطلب");

}

function rejectOrder(id){

db.ref("orders/"+id+"/status").set("rejected");

alert("تم رفض الطلب");

}

/* ================= التسعير ================= */

function renderPricing(){

$("mainContent").innerHTML=`

<h2 class="section-title">💵 تسعير الأدوار</h2>

<input id="waiterPrice" type="number" placeholder="أجر الجرسون">

<input id="baristaPrice" type="number" placeholder="أجر الباريستا">

<input id="accountantPrice" type="number" placeholder="أجر المحاسب">

<button class="btn btn-green" onclick="savePricing()">
💾 حفظ
</button>

`;

db.ref("rolePricing").once("value").then(s=>{

const d=s.val()||{};

$("waiterPrice").value=d.waiter?.hourlyRate || 0;
$("baristaPrice").value=d.barista?.hourlyRate || 0;
$("accountantPrice").value=d.accountant?.hourlyRate || 0;

});

}

function savePricing(){

db.ref("rolePricing").set({

waiter:{
hourlyRate:Number($("waiterPrice").value)
},

barista:{
hourlyRate:Number($("baristaPrice").value)
},

accountant:{
hourlyRate:Number($("accountantPrice").value)
}

});

alert("تم حفظ الأسعار");

}

/* ================= الورديات ================= */

function renderShifts(){

$("mainContent").innerHTML=`

<h2 class="section-title">⏰ الورديات</h2>

<div class="list" id="shiftList"></div>

`;

db.ref("shifts").on("value",s=>{

/* ================= التقارير ================= */

function renderReports(){

$("mainContent").innerHTML=`

<h2 class="section-title">📊 التقارير</h2>

<div class="report-box">
<h3>📅 التقرير اليومي</h3>
<p id="dailyReport">...</p>
</div>

<div class="report-box">
<h3>📆 التقرير الأسبوعي</h3>
<p id="weeklyReport">...</p>
</div>

<div class="report-box">
<h3>🗓 التقرير الشهري</h3>
<p id="monthlyReport">...</p>
</div>

`;

db.ref("orders").once("value").then(s=>{

let total=0;
let count=s.numChildren();

s.forEach(x=>{
total+=Number(x.val().total||0);
});

$("dailyReport").innerText=`عدد الطلبات: ${count} | المبيعات: ${total.toLocaleString()} ل.س`;

$("weeklyReport").innerText=`إجمالي أسبوعي تقديري: ${(total*7).toLocaleString()} ل.س`;

$("monthlyReport").innerText=`إجمالي شهري تقديري: ${(total*30).toLocaleString()} ل.س`;

});

}
