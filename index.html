<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو هاني - تشخيص</title>
    <style>
        body{font-family:sans-serif;background:#f0f0f0;padding:20px;text-align:center}
        button{padding:15px 30px;font-size:20px}
    </style>
</head>
<body>
    <h2>اختبار الاتصال وتسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم"><br><br>
    <input type="password" id="password" placeholder="كلمة المرور"><br><br>
    <button onclick="testLogin()">دخول</button>
    <div id="log" style="margin-top:20px;color:blue"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const log = (msg) => { document.getElementById('log').innerHTML += msg + "<br>"; };
        try {
            firebase.initializeApp({databaseURL:"https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/"});
            log("✅ Firebase initialized");
        } catch(e) {
            alert("خطأ في تهيئة Firebase: " + e.message);
        }
        const db = firebase.database();

        function testLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            log("⏳ جاري تسجيل الدخول...");
            alert("بدء محاولة الدخول"); // للتأكيد أن الزر يعمل

            db.ref('managers').once('value').then(snap => {
                log("📥 تم استلام بيانات المدراء");
                let found = false;
                snap.forEach(m => {
                    const data = m.val();
                    if (data.username === u && data.password === p) {
                        found = true;
                        alert("تم العثور على مدير: " + data.name);
                    }
                });
                if (!found) {
                    // نجرب الموظفين
                    return db.ref('employees').once('value').then(snap2 => {
                        log("📥 تم استلام بيانات الموظفين");
                        snap2.forEach(emp => {
                            const data = emp.val();
                            if (data.username === u && data.password === p) {
                                found = true;
                                alert("تم العثور على موظف: " + data.name);
                            }
                        });
                        if (!found) {
                            alert("❌ اسم المستخدم أو كلمة المرور غير صحيحة");
                            log("❌ لم يتم العثور على مستخدم");
                        }
                    });
                }
            }).catch(error => {
                alert("❌ خطأ في الاتصال: " + error.message);
                log("❌ خطأ: " + error.message);
            });
        }
    </script>
</body>
</html>
