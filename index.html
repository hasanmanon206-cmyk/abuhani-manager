<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو هاني - الإدارة</title>
    <!-- خطوط وأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',Tahoma,sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #a18cd1 50%, #fbc2eb 75%, #8fd3f4 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height:100vh;
            padding:20px 10px;
        }
        @keyframes gradientBG{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .container{max-width:550px;margin:0 auto}
        /* شاشة تسجيل الدخول */
        .login-box{
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius:20px;
            padding:30px 20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
            margin-top:50px;
        }
        .login-box h2{
            font-size:28px;
            margin-bottom:20px;
            background: linear-gradient(to right, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box input{
            width:100%;
            padding:12px 15px;
            margin:10px 0;
            border:2px solid #e0e0e0;
            border-radius:12px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }
        .login-box input:focus{
            border-color:#ff6b6b;
            box-shadow:0 0 10px rgba(255,107,107,0.3);
        }
        .btn-login{
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
            border:none;
            color:white;
            font-weight:bold;
            font-size:18px;
            padding:12px;
            width:100%;
            border-radius:12px;
            cursor:pointer;
            margin-top:15px;
            transition:0.3s;
            background-size:200% 200%;
            animation: btnGlow 2s ease infinite;
        }
        @keyframes btnGlow{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .btn-login:hover{transform:scale(1.02)}
        /* الشاشة الرئيسية Dashboard */
        .dashboard{display:none}
        .header{
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius:20px;
            padding:15px 20px;
            margin-bottom:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }
        .header .user-info h3{margin:0;color:#333}
        .header .user-info span{font-size:14px;color:#666}
        .btn-logout{
            background:#ff4757;
            border:none;
            color:white;
            padding:8px 15px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
        }
        .stats-grid{
            display:grid;
            grid-template-columns: repeat(2,1fr);
            gap:15px;
            margin-bottom:25px;
        }
        .stat-card{
            padding:20px;
            border-radius:20px;
            text-align:center;
            color:white;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            transition:0.3s;
        }
        .stat-card:hover{transform:translateY(-3px)}
        .stat-card:nth-child(1){background:linear-gradient(135deg,#ff6b6b,#ee5a24)}
        .stat-card:nth-child(2){background:linear-gradient(135deg,#feca57,#ff9f43)}
        .stat-card:nth-child(3){background:linear-gradient(135deg,#48dbfb,#0abde3)}
        .stat-card:nth-child(4){background:linear-gradient(135deg,#ff9ff3,#f368e0)}
        .stat-card .num{font-size:32px;font-weight:bold}
        .stat-card .label{font-size:14px;opacity:0.9}
        .tabs{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            margin-bottom:20px;
        }
        .tab-btn{
            padding:8px 15px;
            border-radius:20px;
            border:none;
            cursor:pointer;
            font-weight:bold;
            font-size:13px;
            background:rgba(255,255,255,0.7);
            backdrop-filter:blur(5px);
            transition:0.3s;
        }
        .tab-btn.active{
            background:linear-gradient(45deg,#ff6b6b,#feca57);
            color:white;
        }
        .content-card{
            background:rgba(255,255,255,0.85);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:20px;
            margin-bottom:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        }
        .content-card h3{
            margin-bottom:15px;
            font-size:20px;
            background:linear-gradient(45deg,#ff6b6b,#48dbfb);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .list-item{
            background:rgba(255,255,255,0.9);
            border-radius:12px;
            padding:12px 15px;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.05);
            transition:0.2s;
        }
        .list-item:hover{background:#fff}
        .btn-sm{
            padding:5px 12px;
            border:none;
            border-radius:8px;
            font-size:12px;
            font-weight:bold;
            cursor:pointer;
            margin:0 2px;
        }
        .btn-edit{background:#1e90ff;color:white}
        .btn-delete{background:#ff4757;color:white}
        .btn-success{background:#2ed573;color:white}
        .btn-warning{background:#ffa502;color:white}
        .btn-primary{background:linear-gradient(45deg,#6c5ce7,#a29bfe);color:white;border:none;border-radius:12px;padding:10px 20px;font-weight:bold;cursor:pointer;width:100%;margin-top:10px}
        input,select{
            width:100%;
            padding:10px 12px;
            margin:8px 0;
            border:2px solid #e0e0e0;
            border-radius:10px;
            font-size:14px;
            outline:none;
            transition:0.3s;
        }
        input:focus,select:focus{border-color:#ff6b6b}
        .flex-between{display:flex;justify-content:space-between;align-items:center}
        .hidden{display:none}
    </style>
</head>
<body>
<div class="container">
    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="login-box">
        <h2>🏢 أبو هاني</h2>
        <p style="color:#555;margin-bottom:20px">لوحة تحكم الإدارة</p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn-login" onclick="handleLogin()">دخول</button>
    </div>

    <!-- واجهة Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="header">
            <div class="user-info">
                <h3 id="displayName"></h3>
                <span id="displayRole"></span>
            </div>
            <button class="btn-logout" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>

        <!-- الإحصائيات (للمدير فقط) -->
        <div id="managerStats" class="stats-grid hidden"></div>

        <!-- تبويبات -->
        <div id="tabsContainer" class="tabs"></div>

        <!-- محتوى التبويب -->
        <div id="tabContent" class="content-card"></div>

        <!-- زر طلب تغيير الدور للموظفين -->
        <div id="roleChangeSection" style="margin-top:20px"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
    firebase.initializeApp({databaseURL:"https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/"});
    const db=firebase.database();
    let currentUser=null;
    let allCats={},allProds={};

    // ==================== تسجيل الدخول ====================
    function handleLogin(){
        const u=document.getElementById('username').value.trim();
        const p=document.getElementById('password').value.trim();
        if(!u||!p){alert('أدخل اسم المستخدم وكلمة المرور');return;}

        // البحث في المدراء
        db.ref('managers').once('value',snap=>{
            let found=false;
            snap.forEach(m=>{
                const data=m.val();
                if(data.username===u && data.password===p){
                    currentUser={id:m.key,...data,type:'manager'};
                    found=true;
                }
            });
            if(found){ startDashboard(); return; }

            // البحث في الموظفين
            db.ref('employees').once('value',snap2=>{
                snap2.forEach(emp=>{
                    const data=emp.val();
                    if(data.username===u && data.password===p){
                        currentUser={id:emp.key,...data,type:'employee'};
                        found=true;
                    }
                });
                if(found){ startDashboard(); }
                else{ alert('اسم المستخدم أو كلمة المرور غير صحيحة'); }
            });
        });
    }

    function startDashboard(){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('dashboard').style.display='block';
        document.getElementById('displayName').textContent=currentUser.name;
        const roles={barista:'باريستا',waiter:'جرسون',accountant:'محاسب',owner:'مدير عام'};
        document.getElementById('displayRole').textContent=roles[currentUser.role]||'موظف';

        if(currentUser.type==='manager'&&currentUser.role==='owner'){
            // مدير عام
            document.getElementById('managerStats').classList.remove('hidden');
            renderManagerTabs();
            loadStats();
        }else{
            document.getElementById('managerStats').classList.add('hidden');
            renderEmployeeView();
        }
    }

    // ==================== مدير عام ====================
    function loadStats(){
        db.ref('employees').once('value',s=>document.getElementById('statEmp').textContent=s.numChildren());
        db.ref('suppliers').once('value',s=>document.getElementById('statSup').textContent=s.numChildren());
        db.ref('customers').once('value',s=>document.getElementById('statCust').textContent=s.numChildren());
        db.ref('products').once('value',s=>document.getElementById('statProd').textContent=s.numChildren());
    }

    function renderManagerTabs(){
        document.getElementById('managerStats').innerHTML=`
            <div class="stat-card"><div class="num" id="statEmp">0</div><div class="label">موظفين</div></div>
            <div class="stat-card"><div class="num" id="statSup">0</div><div class="label">موردين</div></div>
            <div class="stat-card"><div class="num" id="statCust">0</div><div class="label">عملاء</div></div>
            <div class="stat-card"><div class="num" id="statProd">0</div><div class="label">منتجات</div></div>
        `;
        document.getElementById('tabsContainer').innerHTML=`
            <button class="tab-btn active" onclick="switchMgrTab('employees')">👥 موظفين</button>
            <button class="tab-btn" onclick="switchMgrTab('suppliers')">🚚 موردين</button>
            <button class="tab-btn" onclick="switchMgrTab('customers')">👤 عملاء</button>
            <button class="tab-btn" onclick="switchMgrTab('products')">📦 منتجات</button>
            <button class="tab-btn" onclick="switchMgrTab('categories')">📂 أقسام</button>
            <button class="tab-btn" onclick="switchMgrTab('managers')">🔐 مدراء</button>
            <button class="tab-btn" onclick="switchMgrTab('requests')">📩 طلبات</button>
        `;
        switchMgrTab('employees');
    }

    function switchMgrTab(tab){
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        event.target.classList.add('active');
        const c=document.getElementById('tabContent');
        c.innerHTML='';
        if(tab==='employees') mgrEmployees();
        else if(tab==='suppliers') mgrSuppliers();
        else if(tab==='customers') mgrCustomers();
        else if(tab==='products') mgrProducts();
        else if(tab==='categories') mgrCategories();
        else if(tab==='managers') mgrManagers();
        else if(tab==='requests') mgrRequests();
    }

    function mgrEmployees(){
        let h=`<h3>➕ إضافة موظف</h3>
            <input id="empUsername" placeholder="اسم المستخدم"><input id="empPassword" placeholder="كلمة المرور"><input id="empName" placeholder="الاسم الكامل"><input id="empPhone" placeholder="الهاتف">
            <select id="empRole"><option value="barista">باريستا (5000 ل.س)</option><option value="waiter">جرسون (4000 ل.س)</option><option value="accountant">محاسب (6000 ل.س)</option></select>
            <button class="btn-primary" onclick="addEmployee()">إضافة</button>
            <hr><h3>📋 الموظفين</h3><div id="empList"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadEmployeesList();
    }

    function addEmployee(){
        const u=document.getElementById('empUsername').value.trim();
        const p=document.getElementById('empPassword').value.trim();
        const n=document.getElementById('empName').value.trim();
        const ph=document.getElementById('empPhone').value.trim();
        const r=document.getElementById('empRole').value;
        if(!u||!p||!n){alert('اسم المستخدم وكلمة المرور والاسم مطلوبة');return;}
        const rates={barista:5000,waiter:4000,accountant:6000};
        db.ref('employees').push({username:u,password:p,name:n,phone:ph,role:r,hourlyRate:rates[r],status:'active'});
        alert('تمت الإضافة');
        mgrEmployees();
    }

    function loadEmployeesList(){
        db.ref('employees').on('value',s=>{
            let h='';
            s.forEach(e=>{
                const d=e.val();
                h+=`<div class="list-item"><span>👤 ${d.name} (${d.username}) - ${d.role}</span>
                <div><button class="btn-sm btn-edit" onclick="editEmployee('${e.key}')">✏️</button>
                <button class="btn-sm btn-delete" onclick="db.ref('employees/${e.key}').remove()">🗑️</button></div></div>`;
            });
            document.getElementById('empList').innerHTML=h||'<p>لا يوجد</p>';
        });
    }

    function editEmployee(id){
        db.ref('employees/'+id).once('value',s=>{
            if(!s.exists())return;
            const d=s.val();
            const u=prompt('اسم المستخدم',d.username);if(!u)return;
            const p=prompt('كلمة المرور',d.password);if(!p)return;
            const n=prompt('الاسم',d.name);if(!n)return;
            const ph=prompt('الهاتف',d.phone||'');
            const r=prompt('الدور (barista/waiter/accountant)',d.role);
            const rates={barista:5000,waiter:4000,accountant:6000};
            db.ref('employees/'+id).update({username:u,password:p,name:n,phone:ph,role:r,hourlyRate:rates[r]||d.hourlyRate});
        });
    }

    function mgrSuppliers(){ /* اختصار للبقية */ }
    function mgrCustomers(){}
    function mgrProducts(){}
    function mgrCategories(){}
    function mgrManagers(){}
    function mgrRequests(){}

    // ==================== عرض الموظف ====================
    function renderEmployeeView(){
        if(currentUser.role==='accountant') renderAccountant();
        else if(currentUser.role==='barista') renderBarista();
        else if(currentUser.role==='waiter') renderWaiter();
    }

    function renderAccountant(){ /* ... */ }
    function renderBarista(){ /* ... */ }
    function renderWaiter(){ /* ... */ }

    // دوال مساعدة للباقي ستكتب لاحقاً...
    // هذا هيكل أساسي، يمكن توسيعه لاحقاً.
</script>
</body>
</html>
