<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة البلة - النسخة الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        /* ستايل قوس قزح المتحرك */
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb, #8fd3f4);
            background-size: 400% 400%; animation: rainbowBG 15s ease infinite;
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        @keyframes rainbowBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .main-container {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 25px; width: 95%; max-width: 500px; height: 95vh;
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.4);
        }

        /* إصلاح مشكلة البطاقات (الصورة 102107) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* جعلها مربعات متساوية 2 في كل صف */
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            aspect-ratio: 1 / 1; /* جعل البطاقة مربعة تماماً */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px; color: white; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; cursor: pointer;
        }
        .stat-card i { font-size: 2.5rem; margin-bottom: 10px; }
        .stat-card:active { transform: scale(0.95); }

        /* ألوان البطاقات */
        .c-emp { background: linear-gradient(45deg, #ff4757, #ff6b81); }
        .c-sup { background: linear-gradient(45deg, #ffa502, #ff7f50); }
        .c-cus { background: linear-gradient(45deg, #2ed573, #7bed9f); }
        .c-prd { background: linear-gradient(45deg, #1e90ff, #70a1ff); }

        /* شريط التبويبات العلوي */
        .tabs-nav {
            display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; margin-bottom: 15px;
            scrollbar-width: none; border-bottom: 1px solid #eee;
        }
        .tabs-nav::-webkit-scrollbar { display: none; }
        .tab-item {
            padding: 8px 20px; background: #f1f2f6; border-radius: 20px;
            white-space: nowrap; cursor: pointer; font-weight: bold; color: #57606f;
        }
        .tab-item.active { background: #6c5ce7; color: white; }

        /* ساعة الدوام */
        .work-clock {
            background: #2f3542; color: #eccc68; padding: 10px; border-radius: 15px;
            text-align: center; font-family: monospace; font-size: 1.6rem;
            margin-bottom: 15px; border: 2px solid #eccc68;
        }

        /* زر الإضافة العائم (+) */
        .add-btn {
            position: absolute; bottom: 30px; left: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            background: #6c5ce7; color: white; display: flex;
            align-items: center; justify-content: center; font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); cursor: pointer; z-index: 10;
        }

        .content-area { flex-grow: 1; overflow-y: auto; padding: 5px; }
        
        /* شاشة الدخول */
        .login-box { display: flex; flex-direction: column; gap: 15px; margin-top: 20%; }
        input { padding: 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        .btn-login { padding: 15px; border-radius: 12px; border: none; background: #2ed573; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="login-screen" class="login-box">
        <h2 style="text-align: center;">دخول المدير العام</h2>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-login" onclick="doLogin()">دخول</button>
    </div>

    <div id="admin-screen" style="display: none; height: 100%; flex-direction: column;">
        <div class="work-clock" id="clock">00:00:00</div>
        
        <div class="stats-grid">
            <div class="stat-card c-emp" onclick="switchTab('employees')"><i class="fas fa-user-tie"></i>الموظفين <span id="n-emp">0</span></div>
            <div class="stat-card c-sup" onclick="switchTab('suppliers')"><i class="fas fa-truck"></i>الموردين <span id="n-sup">0</span></div>
            <div class="stat-card c-cus" onclick="switchTab('customers')"><i class="fas fa-users"></i>العملاء <span id="n-cus">0</span></div>
            <div class="stat-card c-prd" onclick="switchTab('products')"><i class="fas fa-box-open"></i>المنتجات <span id="n-prd">0</span></div>
        </div>

        <div class="tabs-nav">
            <div class="tab-item active" onclick="switchTab('employees')">الموظفين</div>
            <div class="tab-item" onclick="switchTab('suppliers')">الموردين</div>
            <div class="tab-item" onclick="switchTab('customers')">العملاء</div>
            <div class="tab-item" onclick="switchTab('products')">المنتجات</div>
            <div class="tab-item" onclick="switchTab('categories')">الأقسام</div>
            <div class="tab-item" onclick="switchTab('shifts')">الورديات</div>
        </div>

        <div class="content-area" id="main-content">
            اختر قسماً لعرض البيانات...
        </div>

        <div class="add-btn" onclick="addNewItem()"><i class="fas fa-plus"></i></div>
    </div>
</div>

<script>
    // ربط القاعدة
    const firebaseConfig = { databaseURL: "https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function doLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "admin123") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'flex';
            updateStats();
        } else { alert("البيانات غير صحيحة!"); }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-SY'); }, 1000);

    function updateStats() {
        database.ref('employees').on('value', s => document.getElementById('n-emp').innerText = s.numChildren());
        database.ref('suppliers').on('value', s => document.getElementById('n-sup').innerText = s.numChildren());
    }

    let currentTab = 'employees';
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
        document.getElementById('main-content').innerHTML = "جاري تحميل " + tab + "...";
        // كود جلب البيانات من Firebase يوضع هنا
    }

    function addNewItem() {
        alert("فتح نافذة إضافة جديد لقسم: " + currentTab);
        // هنا نبرمج النافذة المنبثقة (Modal) للإضافة
    }
</script>
</body>
</html>
