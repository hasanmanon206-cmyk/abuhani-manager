<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة البلة | أبو هاني</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
--bg1:#00c6ff;
--bg2:#0072ff;
--bg3:#7f5af0;
--glass:rgba(255,255,255,0.15);
--glass2:rgba(255,255,255,0.10);
--white:#fff;
--shadow:0 8px 25px rgba(0,0,0,.15);
--radius:24px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
background-size:400% 400%;
animation:bgMove 12s ease infinite;
min-height:100vh;
color:#fff;
padding-bottom:100px;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.hidden{
display:none!important;
}

.topbar{
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
}

.topbar h1{
font-size:34px;
font-weight:bold;
}

.menu-btn{
width:65px;
height:65px;
border-radius:50%;
border:none;
font-size:30px;
color:white;
background:linear-gradient(135deg,#ff00cc,#3333ff);
box-shadow:var(--shadow);
}

.glass{
background:var(--glass);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
box-shadow:var(--shadow);
}

.user-box{
margin:0 15px 20px;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.user-info h2{
font-size:22px;
margin-bottom:5px;
}

.live-clock{
font-size:15px;
opacity:.9;
}

.logout-btn{
background:#ff4757;
border:none;
padding:12px 18px;
border-radius:16px;
color:white;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:0 15px;
margin-bottom:25px;
}

.card-btn{
background:white;
color:#222;
padding:22px 10px;
border-radius:24px;
text-align:center;
font-size:20px;
font-weight:bold;
border:none;
box-shadow:0 6px 15px rgba(0,0,0,.15);
}

.card-btn i{
display:block;
font-size:28px;
margin-bottom:10px;
}

.section{
margin:15px;
padding:20px;
}

.section-title{
font-size:32px;
margin-bottom:20px;
font-weight:bold;
}

.orders-container{
display:flex;
flex-direction:column;
gap:14px;
}

.order-card{
background:rgba(255,255,255,.12);
padding:18px;
border-radius:22px;
border:1px solid rgba(255,255,255,.15);
}

.order-top{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.customer-name{
font-size:22px;
font-weight:bold;
}

.status{
padding:6px 14px;
border-radius:30px;
font-size:14px;
font-weight:bold;
}

.status-new{
background:#ff9800;
}

.status-processing{
background:#2196f3;
}

.status-completed{
background:#4caf50;
}

.order-products{
margin-top:10px;
line-height:2;
font-size:16px;
}

.order-total{
margin-top:10px;
font-size:20px;
font-weight:bold;
color:#ffe082;
}

.order-actions{
display:flex;
gap:10px;
margin-top:15px;
}

.action-btn{
flex:1;
padding:12px;
border:none;
border-radius:14px;
font-weight:bold;
color:white;
}

.accept{
background:#2ecc71;
}

.prepare{
background:#3498db;
}

.finish{
background:#9b59b6;
}

.reject{
background:#e74c3c;
}

.side-menu{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:#ffffff;
color:#222;
z-index:9999;
transition:.3s;
padding:20px;
overflow:auto;
}

.side-menu.active{
right:0;
}

.side-menu h3{
margin-bottom:20px;
font-size:25px;
}

.side-menu button{
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:bold;
background:#f1f3f6;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
z-index:999;
}

.overlay.active{
display:block;
}

.footer{
text-align:center;
padding:25px 15px;
font-size:18px;
opacity:.95;
line-height:1.8;
}

.login-screen{
padding:20px;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.login-box{
width:100%;
max-width:420px;
padding:30px;
text-align:center;
}

.login-box h1{
margin-bottom:25px;
font-size:40px;
}

.login-box input{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:18px;
font-size:18px;
outline:none;
}

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
background:linear-gradient(135deg,#00dbde,#fc00ff);
color:white;
}

.remember{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
font-size:16px;
}

.empty{
text-align:center;
padding:30px;
font-size:18px;
opacity:.9;
}

.badge{
background:red;
color:white;
padding:3px 9px;
border-radius:50px;
font-size:12px;
margin-right:5px;
}

</style>
</head>

<body>

<!-- شاشة تسجيل الدخول -->

<div id="loginScreen" class="login-screen">

<div class="login-box glass">

<h1>☕ إدارة البلة</h1>

<input type="text" id="username" placeholder="اسم المستخدم">

<input type="password" id="password" placeholder="كلمة المرور">

<div class="remember">
<input type="checkbox" id="rememberMe">
<label for="rememberMe">تذكر الجلسة</label>
</div>

<button class="login-btn" onclick="login()">
🚀 دخول
</button>

</div>

</div>

<!-- التطبيق -->

<div id="app" class="hidden">

<div class="topbar">

<h1>إدارة البلة</h1>

<button class="menu-btn" onclick="toggleMenu()">
☰
</button>

</div>

<div class="user-box glass">

<div class="user-info">

<h2 id="welcomeName">أهلاً</h2>

<div class="live-clock" id="clock">
00:00
</div>

</div>

<button class="logout-btn" onclick="logout()">
🚪 خروج
</button>

</div>

<div class="grid">

<button class="card-btn">
👥
الموظفين
</button>

<button class="card-btn">
📦
المنتجات
</button>

<button class="card-btn">
🚚
الموردين
</button>

<button class="card-btn">
📂
الأقسام
</button>

<button class="card-btn">
💰
الأدوار والأجور
</button>

<button class="card-btn">
🧾
الفواتير
</button>

<button class="card-btn">
👤
العملاء
</button>

<button class="card-btn">
⏱️
الورديات
</button>

<button class="card-btn">
⚙️
الإعدادات
</button>

<button class="card-btn">
📊
التقارير
</button>

</div>

<div class="section glass">

<div class="section-title">
🧾 الطلبات
<span class="badge" id="ordersCount">0</span>
</div>

<div id="ordersContainer" class="orders-container">

<div class="empty">
لا توجد طلبات حالياً
</div>

</div>

</div>

<div class="footer">
© عالم الإلكترونيات | تم تطوير وإنشاء هذا التطبيق بواسطة أبو هاني ☕
</div>

</div>

<!-- القائمة -->

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="sideMenu">

<h3>📋 القائمة</h3>

<button>👥 الموظفين</button>
<button>📦 المنتجات</button>
<button>🚚 الموردين</button>
<button>📂 الأقسام</button>
<button>💰 الأدوار والأجور</button>
<button>🧾 الفواتير</button>
<button>📊 التقارير</button>
<button>⚙️ الإعدادات</button>

<button onclick="logout()" style="background:#ff4757;color:white;">
🚪 تسجيل خروج
</button>

</div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
databaseURL:"https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function $(id){
return document.getElementById(id);
}

let currentUser = null;

function toggleMenu(){

$('sideMenu').classList.toggle('active');

$('overlay').classList.toggle('active');

}

function startClock(){

setInterval(()=>{

const now = new Date();

$('clock').innerText =
now.toLocaleTimeString('ar-SY');

},1000);

}

function saveSession(user){

localStorage.setItem(
"abuhani_session",
JSON.stringify(user)
);

}

function loadSession(){

const session =
localStorage.getItem("abuhani_session");

if(session){

currentUser = JSON.parse(session);

showApp();

}

}

function clearSession(){

localStorage.removeItem("abuhani_session");

}

function login(){

const username =
$('username').value.trim();

const password =
$('password').value.trim();

if(!username || !password){

alert("أدخل البيانات");

return;

}

db.ref("managers").once("value")

.then(snapshot=>{

let found = false;

snapshot.forEach(item=>{

const data = item.val();

if(
data.username === username &&
data.password === password
){

found = true;

currentUser = {
id:item.key,
...data
};

if($('rememberMe').checked){

saveSession(currentUser);

}

showApp();

}

});

if(!found){

db.ref("employees").once("value")

.then(snap=>{

let empFound = false;

snap.forEach(emp=>{

const d = emp.val();

if(
d.username === username &&
d.password === password
){

empFound = true;

currentUser = {
id:emp.key,
...d
};

if($('rememberMe').checked){

saveSession(currentUser);

}

startShift();

showApp();

}

});

if(!empFound){

alert("بيانات الدخول غير صحيحة");

}

});

}

});

}

function showApp(){

$('loginScreen').classList.add('hidden');

$('app').classList.remove('hidden');

$('welcomeName').innerText =
`👋 ${currentUser.name}`;

startClock();

listenOrders();

}

function logout(){

if(currentUser){

endShift();
}

clearSession();

location.reload();

}

function startShift(){

const startTime = Date.now();

const shift = {

employeeId:currentUser.id,
employeeName:currentUser.name,
role:currentUser.role || "موظف",
hourlyRate:currentUser.hourlyRate || 0,
startTime:startTime,
status:"active"

};

db.ref("activeShifts/"+currentUser.id)
.set(shift);

}

function endShift(){

db.ref("activeShifts/"+currentUser.id)
.once("value")
.then(snapshot=>{

if(snapshot.exists()){

const shift = snapshot.val();

const endTime = Date.now();

const hours =
(endTime - shift.startTime)
/
1000
/
60
/
60;

const salary =
Math.round(hours * shift.hourlyRate);

const completedShift = {

...shift,
endTime:endTime,
workedHours:hours.toFixed(2),
salary:salary,
status:"completed"

};

db.ref("completedShifts")
.push(completedShift);

db.ref("activeShifts/"+currentUser.id)
.remove();

}

});

}

function listenOrders(){

db.ref("orders")
.on("value",snapshot=>{

let html = "";

let count = 0;

if(snapshot.exists()){

const orders = [];

snapshot.forEach(item=>{

orders.unshift({
id:item.key,
...item.val()
});

});

count = orders.length;

orders.forEach(order=>{

let productsHTML = "";

if(order.items){

order.items.forEach(p=>{

productsHTML += `
<div>
• ${p.name}
× ${p.qty}
= ${(p.total || 0).toLocaleString()} ل.س
</div>
`;

});

}

let statusClass = "status-new";

if(order.status === "processing"){

statusClass = "status-processing";

}

if(order.status === "completed"){

statusClass = "status-completed";

}

html += `

<div class="order-card">

<div class="order-top">

<div>

<div class="customer-name">
${order.customer?.name || "زبون"}
</div>

<div>
📞 ${order.customer?.phone || "-"}
</div>

</div>

<div class="status ${statusClass}">
${order.status || "new"}
</div>

</div>

<div class="order-products">
${productsHTML}
</div>

<div class="order-total">
💰 الإجمالي:
${(order.total || 0).toLocaleString()}
ل.س
</div>

<div style="margin-top:10px;">
🕒 ${order.date || ""}
</div>

<div class="order-actions">

<button class="action-btn accept"
onclick="changeOrderStatus('${order.id}','accepted')">
✅ قبول
</button>

<button class="action-btn prepare"
onclick="changeOrderStatus('${order.id}','processing')">
👨‍🍳 تحضير
</button>

<button class="action-btn finish"
onclick="changeOrderStatus('${order.id}','completed')">
📦 إنهاء
</button>

</div>

</div>

`;

});

}else{

html = `
<div class="empty">
لا توجد طلبات حالياً
</div>
`;

}

$('ordersContainer').innerHTML = html;

$('ordersCount').innerText = count;

});

}

function changeOrderStatus(orderId,status){

db.ref("orders/"+orderId)
.update({
status:status
});

}

loadSession();

</script>

</body>
</html>
