<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أبو هاني | الإدارة</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root{
--brown:#4e342e;
--beige:#f5e6ca;
--gold:#d4a017;
--green:#16a34a;
--red:#dc2626;
--blue:#2563eb;
--glass:rgba(255,255,255,.18);
--radius:18px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Tahoma,sans-serif;
background:linear-gradient(-45deg,#ff006e,#8338ec,#3a86ff,#06d6a0,#ffbe0b,#fb5607);
background-size:400% 400%;
animation:rainbowBG 15s ease infinite;
min-height:100vh;
padding:15px;
color:#fff;
overflow-x:hidden;
}

@keyframes rainbowBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:1200px;
margin:auto;
}

.glass{
background:var(--glass);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.2);
border-radius:var(--radius);
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 30px rgba(0,0,0,.2);
}

h1,h2,h3{
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin:8px 0;
font-size:15px;
}

button{
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.btn-primary{
background:var(--gold);
color:#fff;
}

.btn-danger{
background:var(--red);
color:#fff;
}

.btn-success{
background:var(--green);
color:#fff;
}

.btn-blue{
background:var(--blue);
color:#fff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,.12);
padding:15px;
border-radius:15px;
}

.hidden{
display:none;
}

.item{
background:rgba(255,255,255,.12);
padding:12px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.tab{
background:#fff;
color:#333;
}

.active-tab{
background:var(--gold);
color:#fff;
}

.footer{
text-align:center;
margin-top:30px;
opacity:.8;
font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<div id="loginScreen" class="glass">
<h1>☕ نظام أبو هاني</h1>

<input type="text" id="username" placeholder="اسم المستخدم">
<input type="password" id="password" placeholder="كلمة المرور">

<select id="roleSelect" class="hidden">
<option value="">اختر الدور</option>
<option value="barista">☕ باريستا</option>
<option value="waiter">🛒 جرسون</option>
<option value="accountant">💰 محاسب</option>
</select>

<button class="btn-primary" onclick="login()">🚀 دخول</button>
<button class="btn-success hidden" id="confirmRoleBtn" onclick="confirmRole()">✅ تأكيد الدور</button>

<p id="loginMsg"></p>
</div>

<div id="dashboard" class="hidden">

<button id="mobileMenuBtn" onclick="toggleMobileMenu()" style="position:fixed;top:15px;left:15px;z-index:999;background:linear-gradient(45deg,#ff006e,#8338ec,#3a86ff);color:white;width:55px;height:55px;border-radius:50%;font-size:22px;box-shadow:0 8px 20px rgba(0,0,0,.3)">
☰
</button>

<div id="mobileSidebar" class="hidden" style="position:fixed;top:0;right:0;width:280px;height:100vh;background:rgba(0,0,0,.45);backdrop-filter:blur(20px);padding:20px;z-index:998;overflow:auto;border-left:1px solid rgba(255,255,255,.2)">
<h2 style="margin-bottom:20px">📱 القائمة</h2>
<div id="mobileTabsContainer"></div>
</div>

<div class="glass">
<div style="display:flex;justify-content:space-between;align-items:center;gap:15px;flex-wrap:wrap">
<div>
<h2 id="welcomeName"></h2>
<p id="welcomeRole"></p>
</div>
<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
<div class="card" style="padding:10px 15px;min-width:120px;text-align:center">
🕒 <span id="liveClock">00:00:00</span>
</div>
<div class="card" style="padding:10px 15px;min-width:180px;text-align:center">
⏱️ مدة الوردية: <span id="shiftDuration">0 دقيقة</span>
</div>
<button class="btn-danger" onclick="logout()">🚪 تسجيل خروج وإنهاء الوردية</button>
</div>
</div>
</div>

<div id="stats" class="grid"></div>

<div class="tabs" id="tabs"></div>

<div class="glass" id="content"></div>

</div>

<div class="footer">
© عالم الإلكترونيات | تم تطوير وإنشاء هذا التطبيق بواسطة أبو هاني ☕
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
databaseURL:"https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let currentUser=null;
let shiftStartTime=null;
let shiftTimer=null;

let ROLE_RATES={
barista:5000,
waiter:4000,
accountant:6000
};

const ROLE_MAP={
owner:{label:'مدير عام',icon:'👑'},
barista:{label:'باريستا',icon:'☕'},
waiter:{label:'جرسون',icon:'🛒'},
accountant:{label:'محاسب',icon:'💰'}
};

function $(id){
return document.getElementById(id);
}

function initSystem(){

const adminRef=db.ref('managers/6057961002');

adminRef.once('value').then(snapshot=>{

if(!snapshot.exists()){

adminRef.set({
name:'أبو هاني',
phone:'0932293515',
role:'owner',
username:'admin',
password:'admin321'
});

}

});

const pricingRef=db.ref('rolePricing');

pricingRef.once('value').then(snapshot=>{

if(!snapshot.exists()){

pricingRef.set({
barista:{hourlyRate:5000},
waiter:{hourlyRate:4000},
accountant:{hourlyRate:6000}
});

}else{

const data=snapshot.val();

ROLE_RATES={
barista:data.barista?.hourlyRate||5000,
waiter:data.waiter?.hourlyRate||4000,
accountant:data.accountant?.hourlyRate||6000
};

}

});

}

initSystem();

function login(){

const username=$('username').value.trim();
const password=$('password').value.trim();

if(!username||!password){
$('loginMsg').innerText='⚠️ أدخل بيانات الدخول';
return;
}

// مدير
if(username==='admin'&&password==='admin321'){

currentUser={
name:'أبو هاني',
role:'owner'
};

openDashboard();
return;
}

// موظفين

db.ref('employees').once('value').then(snapshot=>{

let found=null;

snapshot.forEach(item=>{

const data=item.val();

if(data.username===username&&data.password===password){
found={id:item.key,...data};
}

});

if(found){

currentUser=found;

$('roleSelect').classList.remove('hidden');
$('confirmRoleBtn').classList.remove('hidden');

$('loginMsg').innerText='✅ اختر دورك';

}else{
$('loginMsg').innerText='❌ بيانات غير صحيحة';
}

});

}

function confirmRole(){

const role=$('roleSelect').value;

if(!role){
alert('اختر الدور');
return;
}

currentUser.role=role;

openDashboard();

}

function openDashboard(){

$('loginScreen').classList.add('hidden');
$('dashboard').classList.remove('hidden');

$('welcomeName').innerText=currentUser.name;

$('welcomeRole').innerText=
ROLE_MAP[currentUser.role]?.label||'مدير';

startShift();
startClock();

if(currentUser.role==='owner'){
renderOwner();
}else{
renderEmployee();
}

}

function logout(){
if(currentUser && currentUser.role!=='owner'){
const endTime=Date.now();
const hours=((endTime-shiftStartTime)/1000/60/60).toFixed(2);
const salary=Math.round(hours*(ROLE_RATES[currentUser.role]||0));
const shiftData={
employee:currentUser.name,
role:currentUser.role,
start:shiftStartTime,
end:endTime,
hours:hours,
salary:salary
};

db.ref('shifts').push(shiftData).then(()=>{
alert(`✅ انتهت الوردية
⏱️ عدد الساعات: ${hours}
💰 الأجر: ${salary} ل.س`);
location.reload();
});
}else{
location.reload();
}
}

function startClock(){
function updateClock(){
const now=new Date();
$('liveClock').innerText=now.toLocaleTimeString('ar-EG');
}
updateClock();
setInterval(updateClock,1000);
}

function startShift(){
shiftStartTime=Date.now();
if(shiftTimer) clearInterval(shiftTimer);
shiftTimer=setInterval(()=>{
const diff=Date.now()-shiftStartTime;
const mins=Math.floor(diff/1000/60);
const hrs=Math.floor(mins/60);
$('shiftDuration').innerText=`${hrs} ساعة و ${mins%60} دقيقة`;
},1000);
}

function renderOwner(){

loadStats();

const tabsHTML=`
<button class="tab active-tab" onclick="employeesTab()">👥 الموظفين</button>
<button class="tab" onclick="productsTab()">📦 المنتجات</button>
<button class="tab" onclick="categoriesTab()">📂 الأقسام</button>
<button class="tab" onclick="suppliersTab()">🚚 الموردين</button>
<button class="tab" onclick="ordersTab()">🧾 الطلبات</button>
<button class="tab" onclick="pricingTab()">💰 الأدوار والأجور</button>
<button class="tab" onclick="customersTab()">👤 العملاء</button>
<button class="tab" onclick="invoicesTab()">🧾 الفواتير</button>
<button class="tab" onclick="reportsTab()">📊 التقارير</button>
<button class="tab" onclick="shiftsTab()">⏱️ الورديات</button>
<button class="tab" onclick="settingsTab()">⚙️ الإعدادات</button>
`;

$('tabs').innerHTML=tabsHTML;
$('mobileTabsContainer').innerHTML=tabsHTML;

employeesTab();

}

function renderEmployee(){

$('stats').innerHTML='';
$('tabs').innerHTML='';

if(currentUser.role==='barista'){
baristaTab();
}

if(currentUser.role==='waiter'){
waiterTab();
}

if(currentUser.role==='accountant'){
accountantTab();
}

}

function loadStats(){

Promise.all([
db.ref('employees').once('value'),
db.ref('products').once('value'),
db.ref('orders').once('value'),
db.ref('suppliers').once('value')
]).then(res=>{

$('stats').innerHTML=`
<div class="card"><h2>${res[0].numChildren()}</h2><p>👥 موظفين</p></div>
<div class="card"><h2>${res[1].numChildren()}</h2><p>📦 منتجات</p></div>
<div class="card"><h2>${res[2].numChildren()}</h2><p>🧾 طلبات</p></div>
<div class="card"><h2>${res[3].numChildren()}</h2><p>🚚 موردين</p></div>
`;

});

}

function employeesTab(){

$('content').innerHTML=`
<h2>👥 الموظفين</h2>

<input id="empName" placeholder="اسم الموظف">
<input id="empUser" placeholder="اسم المستخدم">
<input id="empPass" placeholder="كلمة المرور">
<input id="empPhone" placeholder="الهاتف">

<button class="btn-primary" onclick="addEmployee()">➕ إضافة موظف</button>

<hr style="margin:20px 0">

<div id="employeesList"></div>
`;

loadEmployees();

}

function addEmployee(){

const data={
name:$('empName').value,
username:$('empUser').value,
password:$('empPass').value,
phone:$('empPhone').value
};

if(!data.name||!data.username||!data.password){
alert('املأ الحقول');
return;
}


db.ref('employees').push(data).then(()=>{
alert('✅ تمت الإضافة');
employeesTab();
});

}

function loadEmployees(){

const list=$('employeesList');


db.ref('employees').on('value',snapshot=>{

let html='';

snapshot.forEach(item=>{

const data=item.val();

html+=`
<div class="item">
<div>
<b>${data.name}</b><br>
${data.username}
</div>
<button class="btn-danger" onclick="deleteEmployee('${item.key}')">🗑️ حذف</button>
</div>
`;

});

list.innerHTML=html||'<p>لا يوجد موظفين</p>';

});

}

function deleteEmployee(id){

if(confirm('حذف الموظف؟')){
db.ref('employees/'+id).remove();
}

}

function productsTab(){

$('content').innerHTML=`
<h2>📦 المنتجات</h2>

<input id="prodName" placeholder="اسم المنتج">
<input id="prodPrice" type="number" placeholder="السعر">

<button class="btn-primary" onclick="addProduct()">➕ إضافة منتج</button>

<hr style="margin:20px 0">

<div id="productsList"></div>
`;

loadProducts();

}

function addProduct(){

const name=$('prodName').value;
const price=$('prodPrice').value;

if(!name||!price){
alert('أدخل البيانات');
return;
}


db.ref('products').push({
name,
price,
createdAt:Date.now()
});

$('prodName').value='';
$('prodPrice').value='';

}

function loadProducts(){

const list=$('productsList');


db.ref('products').on('value',snapshot=>{

let html='';

snapshot.forEach(item=>{

const data=item.val();

html+=`
<div class="item">
<div>
<b>${data.name}</b><br>
💰 ${data.price} ل.س
</div>
<button class="btn-danger" onclick="deleteProduct('${item.key}')">🗑️ حذف</button>
</div>
`;

});

list.innerHTML=html||'<p>لا يوجد منتجات</p>';

});

}

function deleteProduct(id){

if(confirm('حذف المنتج؟')){
db.ref('products/'+id).remove();
}

}

function pricingTab(){
$('content').innerHTML=`
<h2>💰 تسعير الأدوار</h2>
<label>☕ أجر الباريستا / ساعة</label>
<input type="number" id="baristaRate" value="${ROLE_RATES.barista}">
<label>🛒 أجر الجرسون / ساعة</label>
<input type="number" id="waiterRate" value="${ROLE_RATES.waiter}">
<label>💰 أجر المحاسب / ساعة</label>
<input type="number" id="accountantRate" value="${ROLE_RATES.accountant}">
<button class="btn-success" onclick="saveRolePricing()">💾 حفظ التسعير</button>
`;
}

function saveRolePricing(){
ROLE_RATES={
barista:parseInt($('baristaRate').value)||5000,
waiter:parseInt($('waiterRate').value)||4000,
accountant:parseInt($('accountantRate').value)||6000
};

db.ref('rolePricing').set({
barista:{hourlyRate:ROLE_RATES.barista},
waiter:{hourlyRate:ROLE_RATES.waiter},
accountant:{hourlyRate:ROLE_RATES.accountant}
}).then(()=>{
alert('✅ تم حفظ أجور الأدوار');
});
}

function categoriesTab(){

$('content').innerHTML=`
<h2>📂 الأقسام</h2>

<input id="catName" placeholder="اسم القسم">

<button class="btn-primary" onclick="addCategory()">➕ إضافة قسم</button>

<hr style="margin:20px 0">

<div id="catList"></div>
`;

loadCategories();

}

function addCategory(){

const name=$('catName').value;

if(!name)return;


db.ref('categories').push({name});

$('catName').value='';

}

function loadCategories(){


db.ref('categories').on('value',snapshot=>{

let html='';

snapshot.forEach(item=>{

html+=`
<div class="item">
<div>${item.val().name}</div>
<button class="btn-danger" onclick="deleteCategory('${item.key}')">🗑️</button>
</div>
`;

});

$('catList').innerHTML=html||'<p>لا يوجد أقسام</p>';

});

}

function deleteCategory(id){

if(confirm('حذف القسم؟')){
db.ref('categories/'+id).remove();
}

}

function suppliersTab(){

$('content').innerHTML=`
<h2>🚚 الموردين</h2>

<input id="supName" placeholder="اسم المورد">
<input id="supPhone" placeholder="الهاتف">

<button class="btn-primary" onclick="addSupplier()">➕ إضافة</button>

<hr style="margin:20px 0">

<div id="suppliersList"></div>
`;

loadSuppliers();

}

function addSupplier(){

const name=$('supName').value;
const phone=$('supPhone').value;

if(!name)return;


db.ref('suppliers').push({
name,
phone
});

$('supName').value='';
$('supPhone').value='';

}

function loadSuppliers(){


db.ref('suppliers').on('value',snapshot=>{

let html='';

snapshot.forEach(item=>{

const data=item.val();

html+=`
<div class="item">
<div>
<b>${data.name}</b><br>
📞 ${data.phone||'-'}
</div>
<button class="btn-danger" onclick="deleteSupplier('${item.key}')">🗑️</button>
</div>
`;

});

$('suppliersList').innerHTML=html||'<p>لا يوجد موردين</p>';

});

}

function deleteSupplier(id){

if(confirm('حذف المورد؟')){
db.ref('suppliers/'+id).remove();
}

}

function ordersTab(){

$('content').innerHTML=`
<h2>🧾 الطلبات</h2>
<div id="ordersList"></div>
`;


db.ref('orders').on('value',snapshot=>{

let html='';

snapshot.forEach(item=>{

const data=item.val();

html+=`
<div class="item">
<div>
<b>${data.customerName||'زبون'}</b><br>
الحالة: ${data.status||'new'}
</div>
</div>
`;

});

$('ordersList').innerHTML=html||'<p>لا يوجد طلبات</p>';

});

}

function baristaTab(){

$('content').innerHTML=`
<h2>☕ شاشة الباريستا</h2>
<p>طلبات المشروبات الساخنة ستظهر هنا</p>
`;

}

function waiterTab(){

$('content').innerHTML=`
<h2>🛒 شاشة الجرسون</h2>
<p>إدارة السلات والطلبات</p>
`;

}

function toggleMobileMenu(){
$('mobileSidebar').classList.toggle('hidden');
}

function customersTab(){
$('content').innerHTML=`
<h2>👤 العملاء</h2>
<p>إدارة العملاء ونقاطهم وبياناتهم</p>
`;
}

function invoicesTab(){
$('content').innerHTML=`
<h2>🧾 الفواتير</h2>
<p>إدارة الفواتير والمبيعات اليومية</p>
`;
}

function reportsTab(){
$('content').innerHTML=`
<h2>📊 التقارير</h2>
<p>تقارير الأرباح والمبيعات والموظفين</p>
`;
}

function shiftsTab(){
$('content').innerHTML=`
<h2>⏱️ الورديات</h2>
<p>عرض جميع الورديات والأجور المحسوبة</p>
`;
}

function settingsTab(){
$('content').innerHTML=`
<h2>⚙️ الإعدادات</h2>
<p>إعدادات النظام العامة</p>
`;
}

function accountantTab(){

$('content').innerHTML=`
<h2>💰 شاشة المحاسب</h2>
<p>الفواتير والدفعات</p>
`;

}

</script>

</body>
</html>
