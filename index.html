<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة قهوة البلة - النسخة العملاقة</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        /* 1. تصميم قوس قزح المتحرك */
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb, #8fd3f4);
            background-size: 400% 400%; animation: rainbowBG 15s ease infinite;
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        @keyframes rainbowBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* 2. الحاوية الزجاجية الكبيرة */
        .main-container {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            border-radius: 30px; width: 95%; max-width: 600px; height: 90vh;
            display: flex; flex-direction: column; padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.4);
            position: relative;
        }

        /* 3. تنبيهات الحالة والاتصال */
        .conn-status { font-size: 0.8rem; text-align: center; padding: 5px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }

        .error-popup {
            background: #ff7675; color: white; padding: 10px; border-radius: 12px;
            text-align: center; margin-bottom: 10px; display: none; animation: shake 0.4s;
        }
        @keyframes shake { 0%, 100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

        /* 4. ساعة الدوام */
        .work-clock {
            background: #1e272e; color: #f1c40f; padding: 10px; border-radius: 15px;
            text-align: center; font-family: 'Courier New', monospace; font-size: 1.4rem;
            margin-bottom: 15px; border: 2px solid #f1c40f;
        }

        /* 5. شاشة الدخول */
        #login-screen { text-align: center; margin-top: 50px; }
        .login-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #6c5ce7; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* 6. البطاقات المربعة (المدير العام) */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card {
            padding: 20px; border-radius: 20px; color: white; text-align: center;
            font-weight: bold; transition: 0.3s; cursor: pointer;
        }
        .stat-card:active { transform: scale(0.95); }
        .c1 { background: linear-gradient(45deg, #ff4757, #ff6b81); }
        .c2 { background: linear-gradient(45deg, #ffa502, #ff7f50); }
        .c3 { background: linear-gradient(45deg, #2ed573, #7bed9f); }
        .c4 { background: linear-gradient(45deg, #1e90ff, #70a1ff); }

        /* 7. التبويبات الـ 8 */
        .tabs-wrapper { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .tabs-wrapper::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: rgba(255,255,255,0.6); border: none; padding: 10px 18px;
            border-radius: 25px; white-space: nowrap; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .tab-btn.active { background: #6c5ce7; color: white; box-shadow: 0 4px 12px rgba(108, 92, 231, 0.4); }

        /* 8. منطقة العرض النشطة */
        .content-view { flex-grow: 1; overflow-y: auto; background: rgba(255,255,255,0.4); border-radius: 20px; padding: 15px; }

        .list-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="main-container">
    <div id="status-bar" class="conn-status offline">فحص حالة القاعدة...</div>
    <div id="error-alert" class="error-popup">خطأ في البيانات!</div>

    <div id="login-screen">
        <i class="fas fa-user-lock fa-4x" style="color: #6c5ce7; margin-bottom: 20px;"></i>
        <h2>لوحة إدارة البلة</h2>
        <input type="text" id="username" class="login-input" placeholder="اسم المستخدم">
        <input type="password" id="password" class="login-input" placeholder="كلمة المرور">
        <button class="login-btn" onclick="login()">دخول المنصة</button>
    </div>

    <div id="admin-screen" style="display: none;">
        <div class="work-clock" id="live-clock">00:00:00</div>
        
        <div style="display:flex; justify-content:space-between; margin-bottom: 15px;">
            <strong>مرحباً: أبو هاني</strong>
            <button onclick="location.reload()" style="background:none; border:none; color:red;"><i class="fas fa-power-off"></i></button>
        </div>

        <div class="stats-grid">
            <div class="stat-card c1" onclick="switchTab('employees')"><i class="fas fa-user-tie"></i><br>الموظفين<br><span id="count-e">0</span></div>
            <div class="stat-card c2" onclick="switchTab('suppliers')"><i class="fas fa-truck"></i><br>الموردين<br><span id="count-s">0</span></div>
            <div class="stat-card c3" onclick="switchTab('customers')"><i class="fas fa-users"></i><br>العملاء<br><span id="count-c">0</span></div>
            <div class="stat-card c4" onclick="switchTab('products')"><i class="fas fa-box"></i><br>المنتجات<br><span id="count-p">0</span></div>
        </div>

        <div class="tabs-wrapper">
            <button class="tab-btn active" id="btn-orders" onclick="switchTab('orders')">👥 موظفين</button>
            <button class="tab-btn" onclick="switchTab('suppliers')">🚚 موردين</button>
            <button class="tab-btn" onclick="switchTab('customers')">👤 عملاء</button>
            <button class="tab-btn" onclick="switchTab('products')">📦 منتجات</button>
            <button class="tab-btn" onclick="switchTab('categories')">📂 أقسام</button>
            <button class="tab-btn" onclick="switchTab('managers')">🔐 مدراء</button>
            <button class="tab-btn" onclick="switchTab('requests')">📩 طلبات</button>
            <button class="tab-btn" onclick="switchTab('shifts')">📊 ورديات</button>
        </div>

        <div id="active-view" class="content-view">
            جاري جلب البيانات من القاعدة...
        </div>
    </div>
</div>

<audio id="notif-sound"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    // 1. ربط Firebase
    const firebaseConfig = { databaseURL: "https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. فحص الاتصال الحقيقي
    database.ref(".info/connected").on("value", (snap) => {
        const bar = document.getElementById('status-bar');
        if (snap.val() === true) {
            bar.innerText = "● متصل بالقاعدة"; bar.className = "conn-status online";
        } else {
            bar.innerText = "○ انقطع الاتصال!"; bar.className = "conn-status offline";
        }
    });

    // 3. ساعة الدوام
    setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ar-SY');
    }, 1000);

    // 4. نظام تسجيل الدخول
    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const err = document.getElementById('error-alert');

        if(u === "admin" && p === "admin123") {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('admin-screen').style.display = "flex";
            loadCounts();
            switchTab('orders');
        } else {
            err.innerText = "خطأ في الاسم أو كلمة المرور!";
            err.style.display = "block";
            setTimeout(() => err.style.display = "none", 3000);
        }
    }

    // 5. تحميل العدادات للبطاقات
    function loadCounts() {
        database.ref('employees').on('value', s => document.getElementById('count-e').innerText = s.numChildren());
        database.ref('suppliers').on('value', s => document.getElementById('count-s').innerText = s.numChildren());
        database.ref('customers').on('value', s => document.getElementById('count-c').innerText = s.numChildren());
        database.ref('products').on('value', s => document.getElementById('count-p').innerText = s.numChildren());
    }

    // 6. التبديل بين التبويبات وعرض البيانات
    function switchTab(type) {
        // تحديث شكل الأزرار
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const area = document.getElementById('active-view');
        area.innerHTML = "جاري تحميل " + type + "...";

        database.ref(type).on('value', (snapshot) => {
            area.innerHTML = "";
            if(!snapshot.exists()) { area.innerHTML = "لا توجد بيانات حالياً."; return; }
            
            snapshot.forEach((child) => {
                const data = child.val();
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div>
                        <strong>${data.name || data.username || 'بدون اسم'}</strong><br>
                        <small>${data.role || data.phone || ''}</small>
                    </div>
                    <i class="fas fa-chevron-left" style="color:#ddd"></i>
                `;
                area.appendChild(item);
            });
        });
    }
</script>
</body>
</html>
