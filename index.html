<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - أبو هاني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a1a; color: white; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: auto; }
        .header { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .role-badge { background: #f39c12; padding: 5px 15px; border-radius: 30px; font-size: 0.9rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #2c2c3a; border: none; padding: 10px 20px; border-radius: 30px; color: white; cursor: pointer; }
        .tab-btn.active { background: #e67e22; }
        .panel { display: none; background: rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; }
        .panel.active-panel { display: block; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .product-card { background: #1e1e2e; border-radius: 16px; padding: 12px; text-align: center; }
        .order-card { background: #1a1a2a; border-radius: 16px; padding: 15px; margin-bottom: 15px; border-right: 5px solid #f39c12; }
        button, .btn-small { background: #27ae60; border: none; padding: 8px 16px; border-radius: 30px; color: white; cursor: pointer; margin-top: 8px; }
        .btn-danger { background: #c0392b; }
        .btn-warning { background: #f39c12; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 12px; border: none; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <div><i class="fas fa-chalkboard-user"></i> <strong>نظام أبو هاني الإداري</strong></div>
        <div class="role-badge" id="roleBadge">مدير</div>
        <button id="logoutBtn" class="btn-small btn-danger" style="background:#555"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>

    <div class="tabs" id="tabsContainer"></div>

    <!-- لوحة المدير -->
    <div id="managerPanel" class="panel">
        <h3><i class="fas fa-crown"></i> إدارة المنتجات</h3>
        <div class="flex-between" style="gap:10px; flex-wrap:wrap">
            <input type="text" id="prodName" placeholder="اسم المنتج" style="flex:2">
            <input type="number" id="prodPrice" placeholder="السعر" style="flex:1">
            <button id="addProductBtn"><i class="fas fa-plus"></i> إضافة</button>
        </div>
        <div id="productsList" class="products-grid">جاري التحميل...</div>
        <hr style="margin: 20px 0">
        <h3><i class="fas fa-qrcode"></i> تحديث باركود شام كاش</h3>
        <input type="text" id="barcodeUrl" placeholder="رابط صورة الباركود الجديد">
        <button id="updateBarcodeBtn">تحديث باركود الدفع</button>
    </div>

    <!-- لوحة المحاسب -->
    <div id="accountantPanel" class="panel">
        <h3><i class="fas fa-chart-line"></i> التقارير المالية والطلبات</h3>
        <div id="financeStats" class="product-card" style="text-align:center; margin-bottom:20px;">جاري حساب الإجمالي...</div>
        <div id="allOrdersList"></div>
    </div>

    <!-- لوحة الباريستا -->
    <div id="baristaPanel" class="panel">
        <h3><i class="fas fa-mug-hot"></i> طلبات جاهزة للتحضير</h3>
        <div id="baristaOrders"></div>
    </div>
</div>

<script type="module">
    // استيراد Firebase (يفترض وجود firebase-config.js)
    import { db } from './firebase-config.js';
    import { ref, onValue, push, set, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    // محاكاة تسجيل الدخول (سؤال: من أنت؟)
    let currentRole = localStorage.getItem('userRole') || 'manager'; // تجريبياً: مدير
    document.getElementById('roleBadge').innerText = currentRole === 'manager' ? 'مدير' : (currentRole === 'accountant' ? 'محاسب' : 'باريستا');
    
    // إظهار التبويبات حسب الدور
    const tabsContainer = document.getElementById('tabsContainer');
    const panels = {
        manager: document.getElementById('managerPanel'),
        accountant: document.getElementById('accountantPanel'),
        barista: document.getElementById('baristaPanel')
    };
    
    if(currentRole === 'manager') {
        tabsContainer.innerHTML = `<button class="tab-btn active" data-panel="manager">📦 المنتجات</button><button class="tab-btn" data-panel="accountant">💰 المالية</button><button class="tab-btn" data-panel="barista">☕ الطلبات</button>`;
        showPanel('manager');
    } else if(currentRole === 'accountant') {
        tabsContainer.innerHTML = `<button class="tab-btn active" data-panel="accountant">📊 المالية والتقارير</button>`;
        showPanel('accountant');
    } else if(currentRole === 'barista') {
        tabsContainer.innerHTML = `<button class="tab-btn active" data-panel="barista">🍽️ طلبات التحضير</button>`;
        showPanel('barista');
    }
    
    function showPanel(panelName) {
        Object.keys(panels).forEach(p => panels[p].classList.remove('active-panel'));
        panels[panelName].classList.add('active-panel');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(document.querySelector(`.tab-btn[data-panel="${panelName}"]`))
            document.querySelector(`.tab-btn[data-panel="${panelName}"]`).classList.add('active');
    }
    
    document.getElementById('tabsContainer').addEventListener('click', (e) => {
        if(e.target.classList.contains('tab-btn')) {
            const panel = e.target.dataset.panel;
            if(panel && panels[panel]) showPanel(panel);
        }
    });
    
    // ========== 1. وظائف المدير ==========
    if(currentRole === 'manager') {
        const productsRef = ref(db, 'products');
        onValue(productsRef, (snap) => {
            if(snap.exists()) {
                const products = Object.entries(snap.val()).map(([id,val])=>`
                    <div class="product-card">
                        <i class="fas fa-cup"></i>
                        <div><strong>${val.name}</strong></div>
                        <div>${val.price} ل.س</div>
                        <button class="delProductBtn" data-id="${id}">🗑️ حذف</button>
                    </div>
                `).join('');
                document.getElementById('productsList').innerHTML = products;
                document.querySelectorAll('.delProductBtn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        await set(ref(db, `products/${btn.dataset.id}`), null);
                        Swal.fire('تم الحذف','','info');
                    });
                });
            } else { document.getElementById('productsList').innerHTML = '<p>لا توجد منتجات</p>'; }
        });
        
        document.getElementById('addProductBtn').addEventListener('click', async () => {
            const name = document.getElementById('prodName').value;
            const price = parseInt(document.getElementById('prodPrice').value);
            if(!name || !price) return Swal.fire('املأ البيانات','','error');
            await push(ref(db,'products'), { name, price });
            Swal.fire('تمت الإضافة','','success');
        });
        
        document.getElementById('updateBarcodeBtn').addEventListener('click', async () => {
            const url = document.getElementById('barcodeUrl').value;
            if(!url) return;
            await update(ref(db,'settings'), { paymentBarcode: url });
            Swal.fire('تم','تم تحديث باركود الدفع','success');
        });
    }
    
    // ========== 2. وظائف المحاسب ==========
    if(currentRole === 'accountant') {
        const ordersRef = ref(db, 'orders');
        onValue(ordersRef, (snap) => {
            if(snap.exists()) {
                const orders = Object.entries(snap.val()).map(([id,val])=>`
                    <div class="order-card">
                        <div><strong>رقم الطلب:</strong> ${id.slice(-6)}</div>
                        <div><strong>المصدر:</strong> ${val.source || 'غير محدد'}</div>
                        <div><strong>الإجمالي:</strong> ${val.total} ل.س</div>
                        <div><strong>الحالة:</strong> ${val.status}</div>
                        <div><strong>طريقة الدفع:</strong> ${val.paymentMethod}</div>
                        <hr>
                    </div>
                `).join('');
                document.getElementById('allOrdersList').innerHTML = orders;
                let totalSales = Object.values(snap.val()).reduce((a,o)=>a+o.total,0);
                document.getElementById('financeStats').innerHTML = `<h2>إجمالي المبيعات: ${totalSales} ل.س</h2>`;
            } else {
                document.getElementById('allOrdersList').innerHTML = '<p>لا توجد طلبات</p>';
            }
        });
    }
    
    // ========== 3. وظائف الباريستا ==========
    if(currentRole === 'barista') {
        onValue(ref(db,'orders'), (snap) => {
            if(snap.exists()) {
                let orders = Object.entries(snap.val()).map(([id,val])=> ({id, ...val})).filter(o => o.status !== 'delivered' && o.status !== 'ready');
                if(!orders.length) { document.getElementById('baristaOrders').innerHTML = '<p class="order-card">كل الطلبات جاهزة 👍</p>'; return; }
                document.getElementById('baristaOrders').innerHTML = orders.map(order => `
                    <div class="order-card" data-id="${order.id}">
                        <div class="badge">${order.source === 'online' ? '🛒 أونلاين' : order.source === 'in_store' ? '🏪 داخل المحل' : '🚗 درايف ثرو'}</div>
                        <div><strong>المنتجات:</strong> ${order.items.map(i=>`${i.name} x${i.qty}`).join(' - ')}</div>
                        <div><strong>ملاحظة:</strong> ${order.note || 'لا يوجد'}</div>
                        <button class="markReadyBtn" data-id="${order.id}">✅ أصبح جاهزاً</button>
                    </div>
                `).join('');
                document.querySelectorAll('.markReadyBtn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        await update(ref(db, `orders/${btn.dataset.id}`), { status: 'ready' });
                        Swal.fire('تم','تم تحضير الطلب','success');
                    });
                });
            }
        });
    }
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('userRole');
        window.location.reload();
    });
</script>
</body>
</html>
