<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو هاني - الإدارة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',Tahoma,sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #a18cd1 50%, #fbc2eb 75%, #8fd3f4 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height:100vh;
            padding:20px 10px;
        }
        @keyframes gradientBG{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .container{max-width:550px;margin:0 auto}
        .status-bar{
            padding:8px 15px;
            border-radius:10px;
            text-align:center;
            font-weight:bold;
            margin-bottom:15px;
            transition:0.3s;
        }
        .status-online{background:#2ed573;color:white}
        .status-offline{background:#ff4757;color:white}
        .login-box{
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius:20px;
            padding:30px 20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
            margin-top:50px;
        }
        .login-box h2{
            font-size:28px;
            margin-bottom:20px;
            background: linear-gradient(to right, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box input{
            width:100%;
            padding:12px 15px;
            margin:10px 0;
            border:2px solid #e0e0e0;
            border-radius:12px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }
        .login-box input:focus{
            border-color:#ff6b6b;
            box-shadow:0 0 10px rgba(255,107,107,0.3);
        }
        .btn-login{
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
            border:none;
            color:white;
            font-weight:bold;
            font-size:18px;
            padding:12px;
            width:100%;
            border-radius:12px;
            cursor:pointer;
            margin-top:15px;
            transition:0.3s;
            background-size:200% 200%;
            animation: btnGlow 2s ease infinite;
        }
        @keyframes btnGlow{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .btn-login:hover{transform:scale(1.02)}
        .dashboard{display:none}
        .header{
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius:20px;
            padding:15px 20px;
            margin-bottom:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }
        .header .user-info h3{margin:0;color:#333}
        .header .user-info span{font-size:14px;color:#666}
        .btn-logout{
            background:#ff4757;
            border:none;
            color:white;
            padding:8px 15px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
        }
        .stats-grid{
            display:grid;
            grid-template-columns: repeat(2,1fr);
            gap:15px;
            margin-bottom:25px;
        }
        .stat-card{
            padding:20px;
            border-radius:20px;
            text-align:center;
            color:white;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            transition:0.3s;
        }
        .stat-card:hover{transform:translateY(-3px)}
        .stat-card:nth-child(1){background:linear-gradient(135deg,#ff6b6b,#ee5a24)}
        .stat-card:nth-child(2){background:linear-gradient(135deg,#feca57,#ff9f43)}
        .stat-card:nth-child(3){background:linear-gradient(135deg,#48dbfb,#0abde3)}
        .stat-card:nth-child(4){background:linear-gradient(135deg,#ff9ff3,#f368e0)}
        .stat-card .num{font-size:32px;font-weight:bold}
        .stat-card .label{font-size:14px;opacity:0.9}
        .tabs{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            margin-bottom:20px;
        }
        .tab-btn{
            padding:8px 15px;
            border-radius:20px;
            border:none;
            cursor:pointer;
            font-weight:bold;
            font-size:13px;
            background:rgba(255,255,255,0.7);
            backdrop-filter:blur(5px);
            transition:0.3s;
        }
        .tab-btn.active{
            background:linear-gradient(45deg,#ff6b6b,#feca57);
            color:white;
        }
        .content-card{
            background:rgba(255,255,255,0.85);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:20px;
            margin-bottom:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        }
        .content-card h3{
            margin-bottom:15px;
            font-size:20px;
            background:linear-gradient(45deg,#ff6b6b,#48dbfb);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .list-item{
            background:rgba(255,255,255,0.9);
            border-radius:12px;
            padding:12px 15px;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.05);
            transition:0.2s;
        }
        .list-item:hover{background:#fff}
        .btn-sm{
            padding:5px 12px;
            border:none;
            border-radius:8px;
            font-size:12px;
            font-weight:bold;
            cursor:pointer;
            margin:0 2px;
        }
        .btn-edit{background:#1e90ff;color:white}
        .btn-delete{background:#ff4757;color:white}
        .btn-success{background:#2ed573;color:white}
        .btn-warning{background:#ffa502;color:white}
        .btn-primary{background:linear-gradient(45deg,#6c5ce7,#a29bfe);color:white;border:none;border-radius:12px;padding:10px 20px;font-weight:bold;cursor:pointer;width:100%;margin-top:10px}
        input,select{
            width:100%;
            padding:10px 12px;
            margin:8px 0;
            border:2px solid #e0e0e0;
            border-radius:10px;
            font-size:14px;
            outline:none;
            transition:0.3s;
        }
        input:focus,select:focus{border-color:#ff6b6b}
        .flex-between{display:flex;justify-content:space-between;align-items:center}
        .hidden{display:none}
        .shift-badge{
            display:inline-block;
            padding:3px 10px;
            border-radius:12px;
            font-size:12px;
            font-weight:bold;
        }
        .shift-active{background:#2ed573;color:white}
        .shift-completed{background:#ffa502;color:white}
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
        }
        .modal .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- شريط حالة الاتصال -->
    <div id="connectionStatus" class="status-bar status-offline">⏳ جاري التحقق من الاتصال...</div>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="login-box">
        <h2>🏢 أبو هاني</h2>
        <p style="color:#555;margin-bottom:20px">لوحة تحكم الإدارة</p>
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="username">
        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
        <button class="btn-login" onclick="handleLogin()">دخول</button>
        <p id="loginError" style="color:#ff4757;margin-top:10px;display:none;"></p>
    </div>

    <!-- واجهة Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="header">
            <div class="user-info">
                <h3 id="displayName"></h3>
                <span id="displayRole"></span>
            </div>
            <button class="btn-logout" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>

        <!-- الإحصائيات (للمدير فقط) -->
        <div id="managerStats" class="stats-grid hidden"></div>

        <!-- تبويبات -->
        <div id="tabsContainer" class="tabs"></div>

        <!-- محتوى التبويب -->
        <div id="tabContent" class="content-card"></div>

        <!-- قسم تغيير الدور للموظفين -->
        <div id="roleChangeSection" style="margin-top:20px"></div>
    </div>
    
    <!-- مودال عرض الصورة -->
    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <img id="modalImage" src="">
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
    // تهيئة Firebase
    firebase.initializeApp({databaseURL:"https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/"});
    const db=firebase.database();
    let currentUser=null;
    let allCats={},allProds={};
    let currentCartId=null, invoiceItems=[];
    let activeShiftId=null; // للوردية الحالية للموظف

    // ==================== فحص الاتصال ====================
    function checkConnection(){
        const connectedRef=db.ref(".info/connected");
        connectedRef.on("value", snap=>{
            const statusEl=document.getElementById('connectionStatus');
            if(snap.val()===true){
                statusEl.textContent="✅ متصل بقاعدة البيانات";
                statusEl.className="status-bar status-online";
            }else{
                statusEl.textContent="❌ غير متصل بقاعدة البيانات - تحقق من اتصالك بالإنترنت";
                statusEl.className="status-bar status-offline";
            }
        });
    }

    // ==================== تسجيل الدخول ====================
    function handleLogin(){
        const u=document.getElementById('username').value.trim();
        const p=document.getElementById('password').value.trim();
        const errorEl=document.getElementById('loginError');
        errorEl.style.display='none';

        if(!u||!p){
            errorEl.textContent='⚠️ أدخل اسم المستخدم وكلمة المرور';
            errorEl.style.display='block';
            return;
        }

        // التحقق من المدراء أولاً
        db.ref('managers').once('value').then(snap=>{
            let found=false;
            snap.forEach(m=>{
                const data=m.val();
                if(data.username===u && data.password===p){
                    currentUser={id:m.key,...data,type:'manager'};
                    found=true;
                }
            });
            if(found){ startDashboard(); return; }

            // البحث في الموظفين
            return db.ref('employees').once('value').then(snap2=>{
                snap2.forEach(emp=>{
                    const data=emp.val();
                    if(data.username===u && data.password===p){
                        currentUser={id:emp.key,...data,type:'employee'};
                        found=true;
                    }
                });
                if(found){ startDashboard(); }
                else{
                    errorEl.textContent='❌ اسم المستخدم أو كلمة المرور غير صحيحة';
                    errorEl.style.display='block';
                }
            });
        }).catch(error=>{
            errorEl.textContent='❌ خطأ في الاتصال بقاعدة البيانات. تأكد من اتصالك بالإنترنت.';
            errorEl.style.display='block';
            console.error(error);
        });
    }

    function startDashboard(){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('dashboard').style.display='block';
        document.getElementById('displayName').textContent=currentUser.name;
        const roles={barista:'باريستا',waiter:'جرسون',accountant:'محاسب',owner:'مدير عام'};
        document.getElementById('displayRole').textContent=roles[currentUser.role]||'موظف';

        if(currentUser.type==='manager' && currentUser.role==='owner'){
            document.getElementById('managerStats').classList.remove('hidden');
            renderManagerView();
        }else{
            document.getElementById('managerStats').classList.add('hidden');
            document.getElementById('tabsContainer').innerHTML='';
            document.getElementById('roleChangeSection').innerHTML='';
            renderEmployeeView();
        }
    }

    // ==================== واجهة المدير العام ====================
    function renderManagerView(){
        loadStats();
        document.getElementById('managerStats').innerHTML=`
            <div class="stat-card"><div class="num" id="statEmp">0</div><div class="label">موظفين</div></div>
            <div class="stat-card"><div class="num" id="statSup">0</div><div class="label">موردين</div></div>
            <div class="stat-card"><div class="num" id="statCust">0</div><div class="label">عملاء</div></div>
            <div class="stat-card"><div class="num" id="statProd">0</div><div class="label">منتجات</div></div>
        `;
        document.getElementById('tabsContainer').innerHTML=`
            <button class="tab-btn active" onclick="switchMgrTab('employees')">👥 موظفين</button>
            <button class="tab-btn" onclick="switchMgrTab('suppliers')">🚚 موردين</button>
            <button class="tab-btn" onclick="switchMgrTab('customers')">👤 عملاء</button>
            <button class="tab-btn" onclick="switchMgrTab('products')">📦 منتجات</button>
            <button class="tab-btn" onclick="switchMgrTab('categories')">📂 أقسام</button>
            <button class="tab-btn" onclick="switchMgrTab('managers')">🔐 مدراء</button>
            <button class="tab-btn" onclick="switchMgrTab('requests')">📩 طلبات</button>
            <button class="tab-btn" onclick="switchMgrTab('shifts')">📊 الورديات</button>
        `;
        switchMgrTab('employees');
    }

    function loadStats(){
        db.ref('employees').once('value',s=>document.getElementById('statEmp').textContent=s.numChildren());
        db.ref('suppliers').once('value',s=>document.getElementById('statSup').textContent=s.numChildren());
        db.ref('customers').once('value',s=>document.getElementById('statCust').textContent=s.numChildren());
        db.ref('products').once('value',s=>document.getElementById('statProd').textContent=s.numChildren());
    }

    function switchMgrTab(tab){
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        event.target.classList.add('active');
        const c=document.getElementById('tabContent');
        c.innerHTML='';
        if(tab==='employees') mgrEmployees();
        else if(tab==='suppliers') mgrSuppliers();
        else if(tab==='customers') mgrCustomers();
        else if(tab==='products') mgrProducts();
        else if(tab==='categories') mgrCategories();
        else if(tab==='managers') mgrManagers();
        else if(tab==='requests') mgrRequests();
        else if(tab==='shifts') mgrShifts();
    }

    // ---- الموظفين ----
    function mgrEmployees(){
        let h=`<h3>➕ إضافة موظف</h3>
            <input id="empUsername" placeholder="اسم المستخدم"><input id="empPassword" placeholder="كلمة المرور"><input id="empName" placeholder="الاسم الكامل"><input id="empPhone" placeholder="الهاتف">
            <select id="empRole" onchange="updateDefaultRate()"><option value="barista">باريستا</option><option value="waiter">جرسون</option><option value="accountant">محاسب</option></select>
            <input id="empRate" placeholder="أجرة الساعة (ل.س)" value="5000">
            <button class="btn-primary" onclick="addEmployee()">إضافة</button>
            <hr><h3>📋 الموظفين</h3><div id="empList"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadEmployeesList();
    }

    function updateDefaultRate(){
        const role=document.getElementById('empRole').value;
        const rates={barista:5000,waiter:4000,accountant:6000};
        document.getElementById('empRate').value=rates[role];
    }

    function addEmployee(){
        const u=document.getElementById('empUsername').value.trim();
        const p=document.getElementById('empPassword').value.trim();
        const n=document.getElementById('empName').value.trim();
        const ph=document.getElementById('empPhone').value.trim();
        const r=document.getElementById('empRole').value;
        const rate=parseInt(document.getElementById('empRate').value)||0;
        if(!u||!p||!n){alert('اسم المستخدم وكلمة المرور والاسم مطلوبة');return;}
        db.ref('employees').push({username:u,password:p,name:n,phone:ph,role:r,hourlyRate:rate,status:'active'});
        alert('تمت الإضافة');
        mgrEmployees();
    }

    function loadEmployeesList(){
        db.ref('employees').on('value',s=>{
            let h='';
            s.forEach(e=>{
                const d=e.val();
                h+=`<div class="list-item"><span>👤 ${d.name} (${d.username}) - ${d.role} | 💰 ${d.hourlyRate} ل.س/س</span>
                <div><button class="btn-sm btn-edit" onclick="editEmployee('${e.key}')">✏️</button>
                <button class="btn-sm btn-delete" onclick="db.ref('employees/${e.key}').remove()">🗑️</button></div></div>`;
            });
            document.getElementById('empList').innerHTML=h||'<p>لا يوجد</p>';
        });
    }

    function editEmployee(id){
        db.ref('employees/'+id).once('value',s=>{
            if(!s.exists())return;
            const d=s.val();
            const u=prompt('اسم المستخدم',d.username);if(u===null)return;
            const p=prompt('كلمة المرور',d.password);if(p===null)return;
            const n=prompt('الاسم',d.name);if(n===null)return;
            const ph=prompt('الهاتف',d.phone||'');
            const r=prompt('الدور (barista/waiter/accountant)',d.role);
            const rate=parseInt(prompt('أجرة الساعة',d.hourlyRate));
            db.ref('employees/'+id).update({username:u,password:p,name:n,phone:ph||'',role:r,hourlyRate:rate||d.hourlyRate});
        });
    }

    // ---- الموردين ----
    function mgrSuppliers(){
        let h=`<h3>➕ إضافة مورد</h3>
            <input id="supName" placeholder="اسم المورد"><input id="supPhone" placeholder="الهاتف">
            <button class="btn-primary" onclick="addSupplier()">إضافة</button>
            <hr><h3>📋 الموردين</h3><div id="supList"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadSuppliersList();
    }
    function addSupplier(){
        const n=document.getElementById('supName').value.trim();
        const ph=document.getElementById('supPhone').value.trim();
        if(!n){alert('الاسم مطلوب');return;}
        db.ref('suppliers').push({name:n,phone:ph,balance:0});
        alert('تمت الإضافة');
        mgrSuppliers();
    }
    function loadSuppliersList(){
        db.ref('suppliers').on('value',s=>{
            let h='';
            s.forEach(x=>{
                h+=`<div class="list-item"><span>🚚 ${x.val().name} | 📞 ${x.val().phone||'-'}</span>
                <div><button class="btn-sm btn-edit" onclick="editSupplier('${x.key}')">✏️</button>
                <button class="btn-sm btn-delete" onclick="db.ref('suppliers/${x.key}').remove()">🗑️</button></div></div>`;
            });
            document.getElementById('supList').innerHTML=h||'<p>لا يوجد</p>';
        });
    }
    function editSupplier(id){
        db.ref('suppliers/'+id).once('value',s=>{
            if(!s.exists())return;
            const d=s.val();
            const n=prompt('الاسم',d.name);if(n===null)return;
            const ph=prompt('الهاتف',d.phone||'');
            db.ref('suppliers/'+id).update({name:n,phone:ph||''});
        });
    }

    // ---- العملاء ----
    function mgrCustomers(){
        let h=`<h3>➕ إضافة عميل</h3>
            <input id="custName" placeholder="اسم العميل"><input id="custPhone" placeholder="الهاتف">
            <button class="btn-primary" onclick="addCustomer()">إضافة</button>
            <hr><h3>📋 العملاء</h3><div id="custList"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadCustomersList();
    }
    function addCustomer(){
        const n=document.getElementById('custName').value.trim();
        const ph=document.getElementById('custPhone').value.trim();
        if(!n){alert('الاسم مطلوب');return;}
        db.ref('customers').push({name:n,phone:ph,totalPurchases:0,debt:0});
        alert('تمت الإضافة');
        mgrCustomers();
    }
    function loadCustomersList(){
        db.ref('customers').on('value',s=>{
            let h='';
            s.forEach(x=>{
                h+=`<div class="list-item"><span>👤 ${x.val().name} | 📞 ${x.val().phone||'-'}</span>
                <div><button class="btn-sm btn-edit" onclick="editCustomer('${x.key}')">✏️</button>
                <button class="btn-sm btn-delete" onclick="db.ref('customers/${x.key}').remove()">🗑️</button></div></div>`;
            });
            document.getElementById('custList').innerHTML=h||'<p>لا يوجد</p>';
        });
    }
    function editCustomer(id){
        db.ref('customers/'+id).once('value',s=>{
            if(!s.exists())return;
            const d=s.val();
            const n=prompt('الاسم',d.name);if(n===null)return;
            const ph=prompt('الهاتف',d.phone||'');
            db.ref('customers/'+id).update({name:n,phone:ph||''});
        });
    }

    // ---- المنتجات ----
    function mgrProducts(){
        let h=`<h3>➕ إضافة منتج</h3>
            <input id="prodName" placeholder="اسم المنتج"><input id="prodPrice" placeholder="السعر"><input id="prodStock" placeholder="المخزون">
            <select id="prodCat"><option value="">اختر القسم</option></select>
            <button class="btn-primary" onclick="addProduct()">إضافة</button>
            <hr><h3>📋 المنتجات</h3><div id="prodList"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadProdCats();
        loadProductsList();
    }
    function loadProdCats(){
        db.ref('categories').on('value',s=>{
            let h='<option value="">اختر القسم</option>';
            s.forEach(c=>{allCats[c.key]={id:c.key,...c.val()};h+=`<option value="${c.key}">${c.val().name}</option>`;});
            const el=document.getElementById('prodCat');if(el)el.innerHTML=h;
        });
    }
    function addProduct(){
        const n=document.getElementById('prodName').value.trim();
        const pr=parseInt(document.getElementById('prodPrice').value);
        const st=parseInt(document.getElementById('prodStock').value);
        const cat=document.getElementById('prodCat').value;
        if(!n||!pr||!st||!cat){alert('املأ جميع الحقول');return;}
        db.ref('products').push({name:n,price:pr,stock:st,categoryId:cat});
        alert('تمت الإضافة');
        mgrProducts();
    }
    function loadProductsList(){
        db.ref('products').on('value',s=>{
            allProds={};let h='';
            s.forEach(p=>{
                allProds[p.key]={id:p.key,...p.val()};
                h+=`<div class="list-item"><span>📦 ${p.val().name} | 💰 ${p.val().price} ل.س | 📦 ${p.val().stock}</span>
                <div><button class="btn-sm btn-edit" onclick="editProduct('${p.key}')">✏️</button>
                <button class="btn-sm btn-delete" onclick="db.ref('products/${p.key}').remove()">🗑️</button></div></div>`;
            });
            document.getElementById('prodList').innerHTML=h||'<p>لا يوجد</p>';
        });
    }
    function editProduct(id){
        db.ref('products/'+id).once('value',s=>{
            if(!s.exists())return;
            const d=s.val();
            const n=prompt('الاسم',d.name);if(n===null)return;
            const pr=parseInt(prompt('السعر',d.price));
            const st=parseInt(prompt('المخزون',d.stock));
            db.ref('products/'+id).update({name:n,price:pr,stock:st});
        });
    }

    // ---- الأقسام ----
    function mgrCategories(){
        let h=`<h3>➕ إضافة قسم</h3>
            <input id="catName" placeholder="اسم القسم">
            <button class="btn-primary" onclick="addCategory()">إضافة</button>
            <hr><h3>📋 الأقسام</h3><div id="catList"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadCategoriesList();
    }
    function addCategory(){
        const n=document.getElementById('catName').value.trim();
        if(!n){alert('الاسم مطلوب');return;}
        db.ref('categories').push({name:n});
        alert('تمت الإضافة');
        mgrCategories();
    }
    function loadCategoriesList(){
        db.ref('categories').on('value',s=>{
            allCats={};let h='';
            s.forEach(c=>{allCats[c.key]={id:c.key,...c.val()};h+=`<div class="list-item"><span>📂 ${c.val().name}</span><div><button class="btn-sm btn-edit" onclick="editCategory('${c.key}')">✏️</button><button class="btn-sm btn-delete" onclick="db.ref('categories/${c.key}').remove()">🗑️</button></div></div>`;});
            document.getElementById('catList').innerHTML=h||'<p>لا يوجد</p>';
        });
    }
    function editCategory(id){
        db.ref('categories/'+id).once('value',s=>{
            if(!s.exists())return;
            const n=prompt('الاسم',s.val().name);if(n===null)return;
            db.ref('categories/'+id).update({name:n});
        });
    }

    // ---- المدراء ----
    function mgrManagers(){
        let h=`<h3>➕ إضافة مدير</h3>
            <input id="mgrUsername" placeholder="اسم المستخدم"><input id="mgrPassword" placeholder="كلمة المرور"><input id="mgrName" placeholder="الاسم الكامل"><input id="mgrPhone" placeholder="الهاتف">
            <button class="btn-primary" onclick="addManager()">إضافة</button>
            <hr><h3>📋 المدراء</h3><div id="mgrList"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadManagersList();
    }
    function addManager(){
        const u=document.getElementById('mgrUsername').value.trim();
        const p=document.getElementById('mgrPassword').value.trim();
        const n=document.getElementById('mgrName').value.trim();
        const ph=document.getElementById('mgrPhone').value.trim();
        if(!u||!p||!n){alert('اسم المستخدم وكلمة المرور والاسم مطلوبة');return;}
        db.ref('managers').push({username:u,password:p,name:n,phone:ph,role:'manager'});
        alert('تمت الإضافة');
        mgrManagers();
    }
    function loadManagersList(){
        db.ref('managers').on('value',s=>{
            let h='';
            s.forEach(m=>{
                if(m.key==='6057961002') return;
                h+=`<div class="list-item"><span>🔐 ${m.val().name} (${m.val().username})</span>
                <div><button class="btn-sm btn-edit" onclick="editManager('${m.key}')">✏️</button>
                <button class="btn-sm btn-delete" onclick="db.ref('managers/${m.key}').remove()">🗑️</button></div></div>`;
            });
            document.getElementById('mgrList').innerHTML=h||'<p>لا يوجد مدراء آخرين</p>';
        });
    }
    function editManager(id){
        db.ref('managers/'+id).once('value',s=>{
            if(!s.exists())return;
            const d=s.val();
            const u=prompt('اسم المستخدم',d.username);if(u===null)return;
            const p=prompt('كلمة المرور',d.password);if(p===null)return;
            const n=prompt('الاسم',d.name);if(n===null)return;
            const ph=prompt('الهاتف',d.phone||'');
            db.ref('managers/'+id).update({username:u,password:p,name:n,phone:ph||''});
        });
    }

    // ---- طلبات تغيير الدور ----
    function mgrRequests(){
        let h=`<h3>📩 طلبات تغيير الدور</h3><div id="reqList"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadRequests();
    }
    function loadRequests(){
        db.ref('roleRequests').on('value',s=>{
            let h='';
            s.forEach(r=>{
                if(r.val().status==='pending'){
                    h+=`<div class="list-item"><span>👤 ${r.val().employeeName} | ${r.val().currentRole} → ${r.val().requestedRole}</span>
                    <div><button class="btn-sm btn-success" onclick="approveReq('${r.key}')">✅</button>
                    <button class="btn-sm btn-delete" onclick="rejectReq('${r.key}')">❌</button></div></div>`;
                }
            });
            document.getElementById('reqList').innerHTML=h||'<p>لا توجد طلبات معلقة</p>';
        });
    }
    function approveReq(id){
        db.ref('roleRequests/'+id).once('value',s=>{
            if(!s.exists())return;
            const r=s.val();
            const rates={barista:5000,waiter:4000,accountant:6000};
            db.ref('employees/'+r.employeeId).update({role:r.requestedRole,hourlyRate:rates[r.requestedRole]});
            db.ref('roleRequests/'+id).update({status:'approved'});
        });
    }
    function rejectReq(id){db.ref('roleRequests/'+id).update({status:'rejected'});}

    // ---- الورديات والتقارير ----
    function mgrShifts(){
        let h=`<h3>📊 جميع الورديات</h3><div id="allShifts"></div>
               <hr><h3>💰 إجمالي الأجور المستحقة (حسب الورديات المكتملة)</h3><div id="totalSalaries"></div>`;
        document.getElementById('tabContent').innerHTML=h;
        loadAllShifts();
    }
    function loadAllShifts(){
        db.ref('shifts').once('value',s=>{
            let h=''; let totalSalaries=0;
            s.forEach(sh=>{
                const d=sh.val();
                let statusBadge='';
                if(d.status==='active') statusBadge='<span class="shift-badge shift-active">نشطة</span>';
                else statusBadge='<span class="shift-badge shift-completed">مكتملة</span>';
                const earnings=d.totalEarnings||0;
                if(d.status==='completed') totalSalaries+=earnings;
                h+=`<div class="list-item"><span>👤 ${d.employeeName} | ${d.startDate||''} - ${d.endDate||'...'} | ⏱️ ${d.totalHours||0} ساعة | 💰 ${earnings} ل.س</span> ${statusBadge}</div>`;
            });
            document.getElementById('allShifts').innerHTML=h||'<p>لا توجد ورديات</p>';
            document.getElementById('totalSalaries').innerHTML=`<strong>${totalSalaries} ل.س</strong>`;
        });
    }

    // ==================== واجهة الموظف ====================
    function renderEmployeeView(){
        const role=currentUser.role;
        // تحميل الوردية الحالية
        db.ref('shifts').orderByChild('employeeId').equalTo(currentUser.id).limitToLast(1).on('value',snap=>{
            activeShiftId=null;
            snap.forEach(s=>{
                if(s.val().status==='active') activeShiftId=s.key;
            });
            // عرض المحتوى حسب الدور
            let roleContent='';
            if(role==='accountant') roleContent=renderAccountant();
            else if(role==='barista') roleContent=renderBarista();
            else if(role==='waiter') roleContent=renderWaiter();
            document.getElementById('tabContent').innerHTML=roleContent;
            // إضافة زر الوردية
            let shiftHtml='';
            if(activeShiftId){
                shiftHtml=`<button class="btn-primary" style="background:#ff4757" onclick="endMyShift()">🚪 إنهاء الوردية</button>`;
            }else{
                shiftHtml=`<button class="btn-primary" onclick="startMyShift()">▶️ بدء وردية</button>`;
            }
            document.getElementById('roleChangeSection').innerHTML=`
                <div class="content-card">
                    <h3>⏱️ ورديتي</h3>
                    ${shiftHtml}
                    <button class="btn-warning btn-primary" style="margin-top:10px" onclick="requestRoleChange()">🔄 طلب تغيير الدور</button>
                </div>`;
        });
    }

    function startMyShift(){
        db.ref('shifts').push({
            employeeId:currentUser.id,
            employeeName:currentUser.name,
            start:Date.now(),
            startDate:new Date().toLocaleString('ar-SY'),
            status:'active',
            hourlyRate:currentUser.hourlyRate,
            totalHours:0,
            totalEarnings:0
        });
    }

    function endMyShift(){
        if(!activeShiftId) return;
        if(!confirm('إنهاء الوردية؟')) return;
        db.ref('shifts/'+activeShiftId).once('value',s=>{
            if(!s.exists())return;
            const shift=s.val();
            const end=Date.now();
            const hours=((end-shift.start)/3600000).toFixed(2);
            const earnings=hours*shift.hourlyRate;
            db.ref('shifts/'+activeShiftId).update({
                end:end,
                endDate:new Date().toLocaleString('ar-SY'),
                status:'completed',
                totalHours:parseFloat(hours),
                totalEarnings:Math.round(earnings)
            });
        });
    }

    function requestRoleChange(){
        const roles={barista:'باريستا',waiter:'جرسون',accountant:'محاسب'};
        const opts=Object.entries(roles).filter(([k])=>k!==currentUser.role).map(([k,v])=>`${k} (${v})`).join(', ');
        const nr=prompt(`دورك الحالي: ${roles[currentUser.role]}\nاختر:\n${opts}\nاكتب بالإنجليزي:`);
        if(!nr||!['barista','waiter','accountant'].includes(nr)){alert('دور غير صالح');return;}
        db.ref('roleRequests').push({
            employeeId:currentUser.id,
            employeeName:currentUser.name,
            currentRole:currentUser.role,
            requestedRole:nr,
            status:'pending',
            date:Date.now()
        });
        alert('تم إرسال الطلب');
    }

    // ---- المحاسب ----
    function renderAccountant(){
        setTimeout(()=>{
            document.querySelector('.tab-btn')?.classList.add('active');
            accTab('orders');
        },50);
        return `
            <div class="tabs">
                <button class="tab-btn" onclick="accTab('orders')">📋 طلبات</button>
                <button class="tab-btn" onclick="accTab('purchases')">📦 فواتير شراء</button>
            </div>
            <div id="accContent"></div>
        `;
    }
    function accTab(tab){
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        event.target.classList.add('active');
        const c=document.getElementById('accContent');
        if(tab==='orders'){
            c.innerHTML=`<h3>طلبات الجرسونات (غير ساخنة)</h3><div id="wOrders"></div>`;
            loadAccOrders();
        }else{
            c.innerHTML=`<h3>فاتورة شراء جديدة</h3>
                <select id="supSel"><option value="">اختر المورد</option></select>
                <input id="invItem" placeholder="الصنف"><input id="invQty" placeholder="الكمية"><input id="invPrice" placeholder="سعر الشراء">
                <button class="btn-warning btn-primary" onclick="addInvItem()">➕ إضافة للفاتورة</button>
                <div id="invItems"></div>
                <button class="btn-success btn-primary" onclick="saveInv()">💾 حفظ الفاتورة</button>
                <hr><h3>فواتير اليوم</h3><div id="invList"></div>`;
            loadSuppliersForInv(); loadInvoices();
        }
    }
    function loadAccOrders(){
        db.ref('waiterCarts').on('value',s=>{
            let h='';
            s.forEach(cart=>{
                const c=cart.val();
                if(c.status==='submitted'&&c.coldItems&&c.coldItems.length>0){
                    h+=`<div class="list-item"><span>🛒 ${c.waiterName} | سلة ${c.cartNumber} | 💰 ${c.coldTotal} ل.س</span>
                    <button class="btn-sm btn-success" onclick="confirmAccPayment('${cart.key}')">✅ استلام</button></div>`;
                }
            });
            document.getElementById('wOrders').innerHTML=h||'<p>لا طلبات</p>';
        });
    }
    function confirmAccPayment(id){if(confirm('تأكيد؟'))db.ref('waiterCarts/'+id).update({status:'paid',accountantId:currentUser.id,paidAt:Date.now()});}
    function loadSuppliersForInv(){
        db.ref('suppliers').on('value',s=>{
            let h='<option value="">اختر</option>';
            s.forEach(x=>h+=`<option value="${x.key}">${x.val().name}</option>`);
            document.getElementById('supSel').innerHTML=h;
        });
    }
    function addInvItem(){
        const item=document.getElementById('invItem').value.trim();
        const qty=parseInt(document.getElementById('invQty').value);
        const price=parseInt(document.getElementById('invPrice').value);
        if(!item||!qty||!price)return;
        invoiceItems.push({item,qty,price,total:qty*price});
        document.getElementById('invItem').value='';document.getElementById('invQty').value='';document.getElementById('invPrice').value='';
        document.getElementById('invItems').innerHTML=invoiceItems.map((i,idx)=>`<div>${i.item} × ${i.qty} = ${i.total} ل.س <button class="btn-sm btn-delete" onclick="invoiceItems.splice(${idx},1);this.parentElement.remove()">❌</button></div>`).join('');
    }
    function saveInv(){
        const sup=document.getElementById('supSel').value;
        if(!sup||invoiceItems.length===0){alert('اختر مورد وأضف أصناف');return;}
        const total=invoiceItems.reduce((s,i)=>s+i.total,0);
        db.ref('purchaseInvoices').push({supplierId:sup,items:[...invoiceItems],total,accountantId:currentUser.id,accountantName:currentUser.name,date:Date.now(),dateStr:new Date().toLocaleString('ar-SY')});
        invoiceItems=[];document.getElementById('invItems').innerHTML='';alert('تم الحفظ');
        accTab('purchases');
    }
    function loadInvoices(){
        db.ref('purchaseInvoices').on('value',s=>{
            let h='';
            s.forEach(inv=>h+=`<div class="list-item"><span>📦 ${inv.val().dateStr} | 💰 ${inv.val().total} ل.س</span><button class="btn-sm btn-delete" onclick="db.ref('purchaseInvoices/${inv.key}').remove()">🗑️</button></div>`);
            document.getElementById('invList').innerHTML=h||'<p>لا فواتير</p>';
        });
    }

    // ---- الباريستا ----
    function renderBarista(){
        setTimeout(()=>loadBaristaOrders(),100);
        return `
            <h3>☕ المشروبات الساخنة</h3>
            <div id="hotNew"></div>
            <h4>⏳ جاري التجهيز</h4><div id="hotPrep"></div>
            <h4>✅ جاهزة</h4><div id="hotReady"></div>`;
    }
    function loadBaristaOrders(){
        db.ref('waiterCarts').on('value',s=>{
            let nw='',pr='',rd='';
            s.forEach(cart=>{
                const c=cart.val();
                if(c.hotItems&&c.hotItems.length){
                    const card=`<div class="list-item"><span>🛒 ${c.waiterName} | سلة ${c.cartNumber} | ${c.hotItems.map(i=>i.name).join(',')}</span>
                    ${c.hotStatus==='submitted'||!c.hotStatus?`<button class="btn-sm btn-success" onclick="startPrep('${cart.key}')">▶️</button>`:''}
                    ${c.hotStatus==='preparing'?`<button class="btn-sm btn-success" onclick="markReady('${cart.key}')">✅</button>`:''}
                    ${c.hotStatus==='ready'?'<span class="shift-badge shift-active">جاهز</span>':''}</div>`;
                    if(c.hotStatus==='submitted'||!c.hotStatus)nw+=card;
                    else if(c.hotStatus==='preparing')pr+=card;
                    else if(c.hotStatus==='ready')rd+=card;
                }
            });
            document.getElementById('hotNew').innerHTML=nw||'<p>لا جديد</p>';
            document.getElementById('hotPrep').innerHTML=pr||'<p>-</p>';
            document.getElementById('hotReady').innerHTML=rd||'<p>-</p>';
        });
    }
    function startPrep(id){db.ref('waiterCarts/'+id).update({hotStatus:'preparing',baristaId:currentUser.id,baristaName:currentUser.name});}
    function markReady(id){db.ref('waiterCarts/'+id).update({hotStatus:'ready'});}

    // ---- الجرسون ----
    function renderWaiter(){
        db.ref('categories').once('value',s=>{allCats={};s.forEach(c=>allCats[c.key]={id:c.key,...c.val()};});
        db.ref('products').once('value',s=>{allProds={};s.forEach(p=>allProds[p.key]={id:p.key,...p.val()};});
        setTimeout(()=>loadMyCarts(),100);
        return `
            <div><h3>🛒 سلاتي</h3><div id="myCarts"></div>
            <button class="btn-primary" onclick="newCart()">➕ سلة جديدة</button></div>
            <div id="cartDetail" class="hidden content-card"></div>
            <div id="prodSection" class="hidden content-card">
                <h3>الأقسام</h3><div id="wCats"></div>
                <div id="wProdsSec" class="hidden"><button class="btn-warning btn-primary" onclick="showWCats()">⬅ رجوع</button><h3>المنتجات</h3><div id="wProds"></div></div>
            </div>`;
    }
    function newCart(){db.ref('waiterCarts').push({waiterId:currentUser.id,waiterName:currentUser.name,cartNumber:Date.now().toString().slice(-4),items:[],hotItems:[],coldItems:[],hotTotal:0,coldTotal:0,status:'active',createdAt:Date.now()});}
    function loadMyCarts(){
        db.ref('waiterCarts').orderByChild('waiterId').equalTo(currentUser.id).on('value',s=>{
            let h='';
            s.forEach(cart=>{
                const c=cart.val();
                if(c.status!=='paid'&&c.status!=='cancelled'){
                    h+=`<div class="list-item"><span>سلة #${c.cartNumber} | 🔥${c.hotItems?.length||0} 🧊${c.coldItems?.length||0} | 💰 ${(c.hotTotal||0)+(c.coldTotal||0)} ل.س</span>
                    <button class="btn-sm btn-edit" onclick="openCart('${cart.key}')">فتح</button>
                    <button class="btn-sm btn-delete" onclick="db.ref('waiterCarts/${cart.key}').update({status:'cancelled'})">🗑️</button></div>`;
                }
            });
            document.getElementById('myCarts').innerHTML=h||'<p>لا سلات نشطة</p>';
        });
    }
    function openCart(id){
        currentCartId=id;
        document.getElementById('cartDetail').classList.remove('hidden');
        document.getElementById('prodSection').classList.remove('hidden');
        db.ref('waiterCarts/'+id).once('value',s=>{
            const c=s.val();
            document.getElementById('cartDetail').innerHTML=`
                <h3>سلة #${c.cartNumber}</h3>
                <p>🔥 ساخن: ${c.hotItems?.map(i=>`${i.name}×${i.qty}`).join(', ')||'لا يوجد'} | ${c.hotTotal} ل.س
                ${c.hotStatus==='ready'?'✅ جاهز':c.hotStatus==='preparing'?'⏳':`<button class="btn-sm btn-warning" onclick="sendHot('${id}')">أرسل للباريستا</button>`}</p>
                <p>🧊 بارد: ${c.coldItems?.map(i=>`${i.name}×${i.qty}`).join(', ')||'لا يوجد'} | ${c.coldTotal} ل.س
                <button class="btn-sm btn-success" onclick="sendCold('${id}')">أرسل للمحاسب</button></p>
            `;
        });
        showWCats();
    }
    function showWCats(){
        document.getElementById('wProdsSec').classList.add('hidden');
        document.getElementById('wCats').classList.remove('hidden');
        let h='';
        Object.values(allCats).forEach(c=>h+=`<div class="list-item" onclick="showWProds('${c.id}','${c.name}')">📁 ${c.name} ➤</div>`);
        document.getElementById('wCats').innerHTML=h;
    }
    function showWProds(catId,catName){
        document.getElementById('wCats').classList.add('hidden');
        document.getElementById('wProdsSec').classList.remove('hidden');
        document.getElementById('wProdsSec').querySelector('h3').textContent=catName;
        const prods=Object.values(allProds).filter(p=>String(p.categoryId)===String(catId));
        let h='';
        prods.forEach(p=>h+=`<div class="list-item">${p.name} | ${p.price} ل.س <button class="btn-sm btn-success" onclick="addToCart('${p.id}','${p.name}',${p.price},'${p.categoryId}')">➕</button></div>`);
        document.getElementById('wProds').innerHTML=h||'<p>لا منتجات</p>';
    }
    function addToCart(pid,name,price,catId){
        if(!currentCartId)return;
        db.ref('waiterCarts/'+currentCartId).once('value',s=>{
            const c=s.val();
            const items=c.items||[];
            const ex=items.find(i=>i.id===pid);
            ex?ex.qty++:items.push({id:pid,name,price,qty:1,total:price});
            if(ex)ex.total=ex.qty*price;
            const hot=items.filter(i=>allProds[i.id]?.categoryId==='cat1');
            const cold=items.filter(i=>allProds[i.id]?.categoryId!=='cat1');
            db.ref('waiterCarts/'+currentCartId).update({items,hotItems:hot,coldItems:cold,hotTotal:hot.reduce((s,i)=>s+i.total,0),coldTotal:cold.reduce((s,i)=>s+i.total,0)});
            openCart(currentCartId);
        });
    }
    function sendHot(id){if(confirm('إرسال؟'))db.ref('waiterCarts/'+id).update({hotStatus:'submitted'});}
    function sendCold(id){if(confirm('إرسال؟'))db.ref('waiterCarts/'+id).update({coldStatus:'submitted',status:'submitted'});}

    // تشغيل فحص الاتصال عند تحميل الصفحة
    window.onload=function(){
        checkConnection();
    };
</script>
