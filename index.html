<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة قهوة البلة - المدير العام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        /* ستايل قوس قزح والواجهة الزجاجية */
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb, #8fd3f4);
            background-size: 400% 400%; animation: rainbow 15s ease infinite;
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        @keyframes rainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .glass-box {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            border-radius: 25px; width: 95%; max-width: 550px; padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3);
            min-height: 80vh; display: flex; flex-direction: column;
        }

        /* مؤشر حالة الاتصال بالقاعدة */
        .db-status { font-size: 0.85rem; text-align: center; margin-bottom: 10px; font-weight: bold; padding: 5px; border-radius: 10px; }
        .online { background: rgba(46, 204, 113, 0.2); color: #27ae60; }
        .offline { background: rgba(231, 76, 60, 0.2); color: #c0392b; }

        /* ساعة الدوام */
        .work-clock {
            background: #2d3436; color: #fdcb6e; padding: 10px; border-radius: 15px;
            text-align: center; font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem; margin-bottom: 15px; border: 2px solid #fdcb6e;
            box-shadow: inset 0 0 10px rgba(253, 203, 110, 0.3);
        }

        /* رسائل الخطأ في تسجيل الدخول */
        .error-alert {
            background: #ff7675; color: white; padding: 10px; border-radius: 10px;
            margin-bottom: 15px; display: none; text-align: center; font-size: 0.9rem;
            animation: shake 0.4s;
        }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        /* التبويبات */
        .tabs-nav { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; margin-bottom: 15px; }
        .tab-btn {
            background: rgba(255,255,255,0.5); border: none; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .tab-btn.active { background: #6c5ce7; color: white; transform: scale(1.05); }

        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1); outline: none; background: rgba(255,255,255,0.5);
        }

        .login-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, #00b09b, #96c93d); color: white;
            font-weight: bold; cursor: pointer; font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="glass-box">
    <div id="db-status" class="db-status offline">
        <i class="fas fa-wifi"></i> جاري التحقق من الاتصال...
    </div>

    <div id="login-screen">
        <div style="text-align:center; margin-bottom: 20px;">
            <i class="fas fa-user-shield fa-3x" style="color: #6c5ce7;"></i>
            <h2>لوحة تحكم أبو هاني</h2>
        </div>
        <div id="error-msg" class="error-alert"></div>
        <input type="text" id="user-name" placeholder="اسم المستخدم">
        <input type="password" id="user-pass" placeholder="كلمة المرور">
        <button class="login-btn" onclick="tryLogin()">دخول للمنصة</button>
    </div>

    <div id="manager-screen" style="display:none;">
        <div class="work-clock" id="live-timer">00:00:00</div>
        
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(this, 'orders')">📋 طلبات</button>
            <button class="tab-btn" onclick="switchTab(this, 'staff')">👥 موظفين</button>
            <button class="tab-btn" onclick="switchTab(this, 'suppliers')">🚚 موردين</button>
            <button class="tab-btn" onclick="switchTab(this, 'charts')">📈 مخططات</button>
            <button class="tab-btn" onclick="switchTab(this, 'shifts')">⏰ ورديات</button>
            <button class="tab-btn" onclick="switchTab(this, 'settings')">⚙️ إعدادات</button>
        </div>

        <div id="display-area" style="flex-grow: 1; overflow-y: auto; background: rgba(255,255,255,0.4); border-radius: 15px; padding: 15px;">
            مرحباً بك يا أبا هاني، جاري جلب آخر البيانات من Firebase...
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase من مشروعك
    const firebaseConfig = { databaseURL: "https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 1. مراقبة حالة الاتصال الحية
    const connectedRef = database.ref(".info/connected");
    connectedRef.on("value", (snap) => {
        const statusDiv = document.getElementById('db-status');
        if (snap.val() === true) {
            statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> متصل بقاعدة البيانات';
            statusDiv.className = "db-status online";
        } else {
            statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> انقطع الاتصال بالقاعدة!';
            statusDiv.className = "db-status offline";
        }
    });

    // 2. تحديث ساعة الدوام
    setInterval(() => {
        const now = new Date();
        document.getElementById('live-timer').innerText = now.toLocaleTimeString('ar-SY');
    }, 1000);

    // 3. منطق تسجيل الدخول والتحذيرات
    function tryLogin() {
        const u = document.getElementById('user-name').value;
        const p = document.getElementById('user-pass').value;
        const err = document.getElementById('error-msg');

        if (!u || !p) {
            err.innerText = "أبا هاني، يرجى ملء الحقول المطلوبة!";
            err.style.display = "block";
            return;
        }

        // تسجيل الدخول الافتراضي للمدير العام
        if (u === "admin" && p === "admin123") {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('manager-screen').style.display = "block";
        } else {
            err.innerText = "خطأ في اسم المستخدم أو كلمة المرور!";
            err.style.display = "block";
        }
    }

    // 4. نظام التبويبات
    function switchTab(btn, tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const area = document.getElementById('display-area');
        area.innerHTML = "جاري تحميل قسم " + btn.innerText + "...";
        
        // هنا يمكن إضافة شروط لتحميل البيانات من Firebase لكل قسم
    }
</script>
</body>
</html>
