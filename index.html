<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو هاني - الإدارة</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; font-weight: bold; border: none; cursor: pointer; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>أبو هاني - دخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <div id="message" class="error"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({databaseURL:"https://abuhaniapp-default-rtdb.asia-southeast1.firebasedatabase.app/"});
        const db = firebase.database();
        const msg = document.getElementById('message');

        // إنشاء حساب المدير تلقائياً إذا لم يكن موجوداً
        db.ref('managers/6057961002').once('value').then(snap => {
            if (!snap.exists() || !snap.val().username) {
                db.ref('managers/6057961002').set({
                    name: "أبو هاني", phone: "0932293515", role: "owner",
                    username: "admin", password: "admin123"
                }).then(() => {
                    msg.className = 'success';
                    msg.textContent = '✅ تم تجهيز المنصة. يمكنك الدخول الآن.';
                });
            } else {
                msg.className = 'success';
                msg.textContent = '✅ المنصة جاهزة.';
            }
        });

        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if (!u || !p) return msg.textContent = 'أدخل البيانات كاملة';

            db.ref('managers').once('value').then(snap => {
                let found = false;
                snap.forEach(m => {
                    const data = m.val();
                    if (data.username === u && data.password === p) {
                        found = true;
                        window.location.href = "https://hasanmanon206-cmyk.github.io/abuhani-manager/dashboard.html"; // سيتم إنشاؤها لاحقاً
                    }
                });
                if (!found) {
                    db.ref('employees').once('value').then(snap2 => {
                        snap2.forEach(emp => {
                            const data = emp.val();
                            if (data.username === u && data.password === p) {
                                found = true;
                                window.location.href = "https://hasanmanon206-cmyk.github.io/abuhani-manager/dashboard.html"; // سيتم إنشاؤها لاحقاً
                            }
                        });
                        if (!found) msg.textContent = '❌ بيانات خاطئة';
                    });
                }
            });
        }
    </script>
</body>
</html>
